---
# yaml-language-server: $schema=https://schemas.vzkn.eu/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kromgo
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.15.1
  url: oci://ghcr.io/home-operations/charts/kromgo
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kromgo
spec:
  chartRef:
    kind: OCIRepository
    name: kromgo
  interval: 1h
  values:
    config:
      prometheus: http://prometheus-operated.{{ .Release.Namespace }}.svc.cluster.local:9090
      badges:
        - title: Talos
          id: talos_version
          query: label_replace(node_os_info{name="Talos"}, "version_id", "$1", "version_id", "v(.+)")
          valueExpr: labels["version_id"]
          icon: si:talos

        - title: Kubernetes
          id: kubernetes_version
          query: label_replace(kubernetes_build_info{service="kubernetes"}, "git_version", "$1", "git_version", "v(.+)")
          valueExpr: labels["git_version"]
          icon: si:kubernetes

        - title: Flux
          id: flux_version
          query: label_replace(flux_instance_info, "revision", "$1", "revision", "v(.+)@sha256:.+")
          valueExpr: labels["revision"]
          icon: si:flux

        - title: Ceph
          id: ceph_version
          query: max by (version) (label_replace(ceph_mon_metadata, "version", "$1", "ceph_version", "ceph version ([^ ]+) .*"))
          valueExpr: labels["version"]
          icon: si:ceph

        - title: Renovate
          id: renovate_status
          query: max(renovate_operator_run_failed)
          valueExpr: 'result == 0.0 ? "passing" : "failing"'
          colorExpr: 'result == 0.0 ? "brightgreen" : "red"'
          icon: si:renovate

        - title: Nodes
          id: cluster_node_count
          query: count(count by (node) (kube_node_status_condition{condition="Ready"}))
          colorExpr: '"green"'

        - title: Pods
          id: cluster_pod_count
          query: sum(kube_pod_status_phase{phase="Running"})
          valueExpr: humanizeCommas(result)
          colorExpr: '"green"'

        - title: CPU
          id: cluster_cpu_usage
          query: round(avg(instance:node_cpu_utilisation:rate5m{pod!=""}) * 100, 0.1)
          valueExpr: string(result) + "%"
          colorExpr: 'colorScale(result, [35.0, 75.0], ["green", "orange", "red"])'

        - title: Memory
          id: cluster_memory_usage
          query: round(sum(node_memory_MemTotal_bytes{pod!=""} - node_memory_MemAvailable_bytes{pod!=""}) / sum(node_memory_MemTotal_bytes{pod!=""}) * 100, 0.1)
          valueExpr: string(result) + "%"
          colorExpr: 'colorScale(result, [35.0, 75.0], ["green", "orange", "red"])'

        - title: Power
          id: cluster_power_usage
          query: avg(upsAdvOutputActivePower)
          valueExpr: humanizeCommas(math.round(result)) + "w"
          colorExpr: 'colorScale(result, [400.0, 750.0], ["green", "orange", "red"])'

        - title: Age
          id: cluster_birth_age
          query: round(time() - min(kube_node_created))
          valueExpr: humanizeDurationDays(result)
          colorExpr: 'colorScale(result, [15552000.0, 31104000.0], ["green", "orange", "red"])'

        - title: Uptime
          id: cluster_uptime_age
          query: round(avg(node_time_seconds{pod!=""} - node_boot_time_seconds{pod!=""}))
          valueExpr: humanizeDurationDays(result)
          colorExpr: 'colorScale(result, [15552000.0, 31104000.0], ["green", "orange", "red"])'

        - title: Alerts
          id: cluster_alert_count
          query: alertmanager_alerts{state="active"} - 1  # Ignore Watchdog
          colorExpr: 'colorScale(result, [1.0], ["green", "red"])'

        - title: Internet
          id: internet_connectivity
          query: gatus_results_endpoint_success{key="connectivity_cloudflare"}
          valueExpr: 'result == 1.0 ? "up" : "down"'
          colorExpr: 'result == 1.0 ? "brightgreen" : "red"'
          icon: si:cloudflare

        - title: VPS Edge
          id: bifrost_edge
          query: gatus_results_endpoint_success{key="vps_bifrost-|-edge"}
          valueExpr: 'result == 1.0 ? "up" : "down"'
          colorExpr: 'result == 1.0 ? "brightgreen" : "red"'
          icon: si:caddy

        - title: Heartbeat
          id: bifrost_heartbeat
          query: gatus_results_endpoint_success{key="vps_bifrost-|-heartbeat-push"}
          valueExpr: 'result == 1.0 ? "up" : "down"'
          colorExpr: 'result == 1.0 ? "brightgreen" : "red"'
          icon: mdi:heart-pulse
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 200"]
      parentRefs:
        - name: envoy-external
          namespace: network
      hostnames:
        - "{{ .Release.Name }}.vzkn.eu"
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 64Mi
