---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kanidm
spec:
  components:
    - ../../../components/kopiur
  dependsOn:
    - name: infisical-operator
      namespace: security
    - name: kopiur
      namespace: kopiur-system
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/platform/security/kanidm
  postBuild:
    substitute:
      APP: *app
      NS: &ns security
      KOPIUR_CAPACITY: 5Gi
      # kanidm runs as 2000:2000; mover must match to read 0600 SQLite WAL/SHM files
      KOPIUR_PUID: "2000"
      KOPIUR_PGID: "2000"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: false
