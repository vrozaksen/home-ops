---
# yaml-language-server: $schema=https://schemas.vzkn.eu/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: towonel-agent
spec:
  endpoints:
    - dnsName: vzkn.eu
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: www.vzkn.eu
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: bifrost.vzkn.eu
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: external.vzkn.eu
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: tunnel.vzkn.eu
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: twnl.vzkn.eu
      recordType: A
      targets:
        - ${VPS_IP}
    - dnsName: ssh.git.vzkn.eu
      recordType: A
      targets:
        - ${VPS_IP}
