---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kanidm-provision-oauth2-observability
  labels:
    kanidm_config: "1"
  annotations:
    reloader.stakater.com/match: "true"
data:
  targetNamespace: observability
  oauth2.json: |
    {
      "groups": {}, "persons": {}, "systems": { "oauth2": {
        "grafana": {
          "present": true, "displayName": "Grafana",
          "originUrl": "https://grafana.vzkn.eu/login/generic_oauth",
          "originLanding": "https://grafana.vzkn.eu/",
          "scopeMaps": { "users": ["openid", "email", "profile", "groups"] },
          "claimMaps": {
            "grafana_role": {
              "joinType": "array",
              "valuesByGroup": { "admins": ["GrafanaAdmin"], "users": ["Editor"] }
            }
          },
          "k8s": { "imageUrl": "https://raw.githubusercontent.com/homarr-labs/dashboard-icons/main/svg/grafana.svg" }
        },
        "karma": {
          "present": true, "displayName": "Karma",
          "originUrl": "https://karma.vzkn.eu/oauth2/callback",
          "originLanding": "https://karma.vzkn.eu/",
          "scopeMaps": { "users": ["openid", "email", "profile", "groups"] },
          "allowInsecureClientDisablePkce": true,
          "k8s": { "imageUrl": "https://raw.githubusercontent.com/homarr-labs/dashboard-icons/main/svg/karma.svg" }
        },
        "victoria-logs": {
          "present": true, "displayName": "VictoriaLogs",
          "originUrl": "https://victoria-logs.vzkn.eu/oauth2/callback", "originLanding": "https://victoria-logs.vzkn.eu/",
          "scopeMaps": { "users": ["openid", "email", "profile", "groups"] },
          "allowInsecureClientDisablePkce": true,
          "k8s": { "imageUrl": "https://raw.githubusercontent.com/homarr-labs/dashboard-icons/main/svg/victoriametrics.svg" }
        },
        "prometheus": {
          "present": true, "displayName": "Prometheus",
          "originUrl": "https://prometheus.vzkn.eu/oauth2/callback", "originLanding": "https://prometheus.vzkn.eu/",
          "scopeMaps": { "users": ["openid", "email", "profile", "groups"] },
          "allowInsecureClientDisablePkce": true,
          "k8s": { "imageUrl": "https://raw.githubusercontent.com/homarr-labs/dashboard-icons/main/svg/prometheus.svg" }
        },
        "alertmanager": {
          "present": true, "displayName": "Alertmanager",
          "originUrl": "https://alertmanager.vzkn.eu/oauth2/callback", "originLanding": "https://alertmanager.vzkn.eu/",
          "scopeMaps": { "users": ["openid", "email", "profile", "groups"] },
          "allowInsecureClientDisablePkce": true,
          "k8s": { "imageUrl": "https://raw.githubusercontent.com/homarr-labs/dashboard-icons/main/svg/prometheus.svg" }
        }
      } } }
