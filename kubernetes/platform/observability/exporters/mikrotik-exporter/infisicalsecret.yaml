---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: mikrotik-exporter-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/observability/mikrotik-exporter
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: mikrotik-exporter-secret
      secretNamespace: observability
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          MIKROTIK_USERNAME: '{{ .MIKROTIK_USERNAME.Value }}'
          MIKROTIK_PASSWORD: '{{ .MIKROTIK_PASSWORD.Value }}'
