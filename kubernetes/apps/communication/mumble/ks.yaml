---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mumble
spec:
  components:
    - ../../../components/volsync
  dependsOn:
    - name: external-secrets-store
      namespace: external-secrets
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/communication/mumble
  postBuild:
    substitute:
      APP: *app
  patches:
    - target:
        group: volsync.backube
        version: v1alpha1
        kind: ReplicationDestination
        name: mumble-dst
      patch: |
        - op: add
          path: /spec/kopia/sourceIdentity/sourceNamespace
          value: self-hosted
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: communication
  wait: false
