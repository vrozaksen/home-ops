---
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: clickhouse-${APP}
spec:
  defaults:
    templates:
      podTemplate: pod-template
      dataVolumeClaimTemplate: data-volume-template
      logVolumeClaimTemplate: log-volume-template
      serviceTemplate: service-template
  configuration:
    users:
      ${APP}/k8s_secret_password: ${NS:=${APP}}/clickhouse-${APP}-secret/password
      ${APP}/networks/ip:
        - "::/0"
      ${APP}/profile: default
      ${APP}/quota: default
      ${APP}/access_management: "1"
    profiles:
      default/allow_experimental_json_type: "1"
      default/allow_experimental_object_type: "1"
      # Disable stack-trace/memory profiler — Snuba hammers CH with subscription
      # queries; per-query sampling bloated system.trace_log to 40Gi+ (2.7B rows)
      # and OOM'd merges. Not needed for a Sentry backend; re-enable to debug CH.
      default/query_profiler_real_time_period_ns: "0"
      default/query_profiler_cpu_time_period_ns: "0"
      default/memory_profiler_step: "0"
      default/memory_profiler_sample_probability: "0"
    settings:
      prometheus/endpoint: /metrics
      prometheus/port: "9363"
      prometheus/metrics: "true"
      prometheus/events: "true"
      prometheus/asynchronous_metrics: "true"
      prometheus/status_info: "true"
    clusters:
      - name: ${APP}
        layout:
          shardsCount: 1
          replicasCount: 1
  templates:
    podTemplates:
      - name: pod-template
        spec:
          priorityClassName: ${CH_PRIORITY_CLASS:=cluster-low}
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist
          containers:
            - name: clickhouse
              image: clickhouse/clickhouse-server:${CH_VERSION:=25.3.6.56-alpine}
              ports:
                - name: metrics
                  containerPort: 9363
                  protocol: TCP
              resources:
                requests:
                  cpu: ${CH_REQUESTS_CPU:=200m}
                  memory: ${CH_REQUESTS_MEMORY:=1Gi}
                limits:
                  memory: ${CH_LIMITS_MEMORY:=4Gi}
    volumeClaimTemplates:
      - name: data-volume-template
        spec:
          storageClassName: ${CH_STORAGECLASS:=ceph-block}
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: ${CH_SIZE:=50Gi}
      - name: log-volume-template
        spec:
          storageClassName: ${CH_STORAGECLASS:=ceph-block}
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: ${CH_LOG_SIZE:=5Gi}
    serviceTemplates:
      - name: service-template
        generateName: clickhouse-${APP}
        spec:
          ports:
            - name: http
              port: 8123
              targetPort: http
            - name: tcp
              port: 9000
              targetPort: tcp
          type: ClusterIP
