---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flux-operator-mcp
  namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flux-operator-mcp-read
rules:
  - apiGroups:
      - ""
    resources:
      - "namespaces"
      - "events"
      - "configmaps"
      - "secrets"
      - "pods"
      - "pods/log"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "fluxcd.controlplane.io"
    resources:
      - "*"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "source.toolkit.fluxcd.io"
    resources:
      - "*"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "kustomize.toolkit.fluxcd.io"
    resources:
      - "*"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "helm.toolkit.fluxcd.io"
    resources:
      - "*"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "notification.toolkit.fluxcd.io"
    resources:
      - "*"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "image.toolkit.fluxcd.io"
    resources:
      - "*"
    verbs:
      - "get"
      - "list"
      - "watch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flux-operator-mcp-read
subjects:
  - kind: ServiceAccount
    name: flux-operator-mcp
    namespace: ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flux-operator-mcp-read
