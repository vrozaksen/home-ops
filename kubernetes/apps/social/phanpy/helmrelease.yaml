---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: phanpy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

    controllers:
      phanpy:
        type: deployment
        containers:
          app:
            image:
              # renovate: datasource=docker depName=ghcr.io/jjgadgets/phanpy
              repository: ghcr.io/jjgadgets/phanpy
              tag: 2026.01.31.8b98d5a
            env:
              PHANPY_WEBSITE: "phanpy.vzkn.eu"
              PHANPY_DEFAULT_INSTANCE: "gts.vzkn.eu"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi

    service:
      app:
        controller: phanpy
        ports:
          http:
            port: 8080
