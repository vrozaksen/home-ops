---
# Talos client config (talosconfig) pushed from Infisical. The config must include
# endpoints + auth cert/key. Generate with: talosctl --talosconfig <path> config new ...
# then store the rendered talosconfig content as TALOSCONFIG secret in Infisical.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name talos-mcp-talosconfig
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /ai/mcp/talos
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: ai
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          config: '{{ .TALOSCONFIG.Value }}'
