---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: stunner-app
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: stunner
  interval: 1h
  path: ./kubernetes/core/network/stunner/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: false
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: stunner-config
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: stunner
  dependsOn:
    - name: infisical-operator
      namespace: security
    - name: stunner-app
      namespace: network
  interval: 1h
  path: ./kubernetes/core/network/stunner/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: false
