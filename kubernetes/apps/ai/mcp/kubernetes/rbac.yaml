---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-mcp
  namespace: ai
---
# Cluster-wide read access for the assistant. Includes Flux/CNPG/ExternalSecrets
# so the agent can introspect actual cluster state. No write/exec/delete verbs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-mcp-read
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - nodes
      - services
      - namespaces
      - configmaps
      - persistentvolumes
      - persistentvolumeclaims
      - endpoints
      - events
      - serviceaccounts
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "apps"
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "batch"
    resources:
      - "jobs"
      - "cronjobs"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "networking.k8s.io"
    resources:
      - "ingresses"
      - "networkpolicies"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "gateway.networking.k8s.io"
    resources:
      - "gateways"
      - "httproutes"
      - "tcproutes"
      - "grpcroutes"
      - "referencegrants"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "storage.k8s.io"
    resources:
      - "storageclasses"
      - "csinodes"
      - "csidrivers"
      - "volumeattachments"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "helm.toolkit.fluxcd.io"
    resources:
      - "helmreleases"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "kustomize.toolkit.fluxcd.io"
    resources:
      - "kustomizations"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "source.toolkit.fluxcd.io"
    resources:
      - "gitrepositories"
      - "helmrepositories"
      - "ocirepositories"
      - "buckets"
      - "helmcharts"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "secrets.infisical.com"
    resources:
      - "infisicalsecrets"
      - "infisicalpushsecrets"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "postgresql.cnpg.io"
    resources:
      - "clusters"
      - "poolers"
      - "scheduledbackups"
      - "backups"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "volsync.backube"
    resources:
      - "replicationsources"
      - "replicationdestinations"
    verbs:
      - "get"
      - "list"
      - "watch"
  - apiGroups:
      - "toolhive.stacklok.dev"
    resources:
      - "mcpservers"
      - "mcpremoteproxies"
      - "virtualmcpservers"
      - "mcpgroups"
      - "mcptelemetryconfigs"
    verbs:
      - "get"
      - "list"
      - "watch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-mcp-read
subjects:
  - kind: ServiceAccount
    name: kubernetes-mcp
    namespace: ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-mcp-read
