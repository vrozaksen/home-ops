---
# yaml-language-server: $schema=https://schemas.vzkn.eu/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: ovh-dns
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.20.0
  url: oci://ghcr.io/home-operations/charts-mirror/external-dns
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ovh-dns
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: ovh-dns
  values:
    fullnameOverride: *app
    provider:
      name: ovh
    env:
      - name: &key1 OVH_APPLICATION_KEY
        valueFrom:
          secretKeyRef:
            name: &secret ovh-dns
            key: *key1
      - name: &key2 OVH_APPLICATION_SECRET
        valueFrom:
          secretKeyRef:
            name: *secret
            key: *key2
      - name: &key3 OVH_CONSUMER_KEY
        valueFrom:
          secretKeyRef:
            name: *secret
            key: *key3
    extraArgs:
      - --crd-source-apiversion=externaldns.k8s.io/v1alpha1
      - --crd-source-kind=DNSEndpoint
      - --gateway-name=envoy-external
    triggerLoopOnEvent: true
    policy: sync
    sources:
      - crd
      - gateway-httproute
    txtOwnerId: default
    txtPrefix: k8s.
    domainFilters:
      - vzkn.eu
    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
    resources:
      requests:
        cpu: 10m
        memory: 144Mi
      limits:
        memory: 288Mi
    nodeSelector:
      node-role.kubernetes.io/control-plane: ""
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
