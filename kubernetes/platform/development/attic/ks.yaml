---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app attic
spec:
  components:
    - ../../../components/cnpg/initdb
  dependsOn:
    - name: infisical-operator
      namespace: security
    - name: plugin-barman-cloud
      namespace: database
  healthCheckExprs:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
  interval: 1h
  patches:
    # Single instance — drop synchronous block (sync standby requires instances > 1)
    - target:
        kind: Cluster
        name: postgres-attic
      patch: |
        - op: remove
          path: /spec/postgresql/synchronous
  path: ./kubernetes/platform/development/attic
  postBuild:
    substitute:
      APP: *app
      NS: &ns development
      CNPG_REPLICAS: "1"
      CNPG_SIZE: 2Gi
      # Single-instance: no app-level replication, use Ceph replica=3 for HA storage
      CNPG_STORAGECLASS: ceph-block
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: false
