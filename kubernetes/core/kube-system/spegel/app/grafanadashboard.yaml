---
# yaml-language-server: $schema=https://schemas.vzkn.eu/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: spegel
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  configMapRef:
    name: spegel-dashboard
    key: spegel-dashboard.json
