---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kguardian
spec:
  dependsOn:
    - name: infisical-operator
      namespace: security
  interval: 1h
  path: ./kubernetes/apps/kguardian/kguardian
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kguardian
  wait: true
  timeout: 10m
