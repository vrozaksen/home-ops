---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app sentry-kubernetes
spec:
  dependsOn:
    - name: infisical-operator
      namespace: security
    - name: sentry
      namespace: sentry
  interval: 1h
  path: ./kubernetes/platform/sentry/sentry-kubernetes
  postBuild:
    substitute:
      APP: *app
      NS: sentry
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: sentry
  timeout: 5m
  wait: false
