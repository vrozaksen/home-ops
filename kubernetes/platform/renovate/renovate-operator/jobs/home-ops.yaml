---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  # Explicit allowlist: only repos still primary on GitHub.
  # Forgejo-migrated repos (renovate-config, vrozaksen, vzkn-eu, nix-config, ...)
  # are scanned by the forgejo RenovateJob — having both jobs scan the same
  # content (via push-mirror) causes force-push lease conflicts.
  discoveryFilters:
    - "vrozaksen/home-ops"
  provider:
    name: github
  image: ghcr.io/renovatebot/renovate:43.256.3@sha256:82dfdb3868046aa6605850bbb718873843f840fcb854765a56cfbf167b05cc54
  schedule: "0 * * * *"
  parallelism: 3
  # Operator mints + refreshes RENOVATE_TOKEN from the GitHub App natively (beta).
  githubAppReference:
    secretName: repo-killer-app-secret
    appIdSecretKey: GITHUB_APP_ID
    installationIdSecretKey: INSTALL_ID
    pemSecretKey: private-key.pem
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  webhook:
    enabled: true
    authentication:
      enabled: false
