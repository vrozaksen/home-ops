---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  discoveryFilter: "vrozaksen/*"
  provider:
    name: github
  image: ghcr.io/renovatebot/renovate:43.86.1@sha256:eaa03ebad1dccb56d3f026ead9701689cd18c2c8d14059ec6acb709bc476f751
  schedule: "0 * * * *"
  parallelism: 3
  secretRef: renovate-token
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: "true"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  webhook:
    enabled: true
    authentication:
      enabled: false
