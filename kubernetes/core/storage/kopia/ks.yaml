---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kopia
spec:
  components:
    # - ../../../components/ext-auth
    - ../../../components/zeroscaler
  dependsOn:
    - name: kanidm
      namespace: security
    - name: prometheus-adapter
      namespace: observability
    - name: volsync
      namespace: storage
  interval: 1h
  path: ./kubernetes/core/storage/kopia
  postBuild:
    substitute:
      APP: *app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: storage
  wait: false
