---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app attic
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      attic:
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/zhaofengli/attic
              tag: cf7294607583a8d9f06026007da1ced564d43c86@sha256:4781271f8bedc37bdf6c082c468348f277f95e1f368473f7f9f88776142c9660
            command:
              - atticd
              - --config
              - /etc/atticd/server.toml
            env:
              ATTIC_SERVER_DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: postgres-attic-app
                    key: uri
            envFrom:
              - secretRef:
                  name: attic-secret
            # probes:
            #   liveness: &probes
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /
            #         port: &port 8080
            #       initialDelaySeconds: 10
            #       periodSeconds: 10
            #       timeoutSeconds: 3
            #       failureThreshold: 3
            #   readiness: *probes
            #   startup:
            #     enabled: true
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /
            #         port: *port
            #       initialDelaySeconds: 0
            #       periodSeconds: 5
            #       timeoutSeconds: 3
            #       failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            group: development
        hostnames:
          - cache.vzkn.eu
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      config:
        type: configMap
        name: attic-config
        globalMounts:
          - path: /etc/atticd/server.toml
            subPath: server.toml
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
