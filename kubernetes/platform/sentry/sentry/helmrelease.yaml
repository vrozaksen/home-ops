---
# yaml-language-server: $schema=https://schemas.vzkn.eu/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: sentry
spec:
  interval: 1h
  url: https://sentry-kubernetes.github.io/charts
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentry
spec:
  interval: 1h
  timeout: 30m
  chart:
    spec:
      # renovate: registryUrl=https://sentry-kubernetes.github.io/charts
      chart: sentry
      version: 32.2.0
      sourceRef:
        kind: HelmRepository
        name: sentry
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: sentry-web
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: OIDC_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: kanidm-sentry-oidc
                      key: client-id
              - op: add
                path: /spec/template/spec/containers/0/env/-
                value:
                  name: OIDC_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: kanidm-sentry-oidc
                      key: client-secret
          - target:
              kind: Deployment
              name: sentry-vroom
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: sentry-vroom
              spec:
                strategy:
                  type: Recreate
                  rollingUpdate: null
          - target:
              kind: Deployment
              name: sentry-ingest-profiles
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: sentry-ingest-profiles
              spec:
                strategy:
                  type: Recreate
                  rollingUpdate: null
          # Single-replica Kafka consumers: RollingUpdate (maxUnavailable=0,
          # maxSurge=1) deadlocks — new pod can't get the lone partition until
          # the old leaves, old won't leave until new is Ready. Recreate kills
          # old first → partition freed → new takes over. Brief consume gap, ok.
          - target:
              kind: Deployment
              name: sentry-(.*consumer.*|.*forward.*|ingest-.*|process-segments|process-spans|monitors-clock-.*|snuba-replacer|uptime-results)
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: all
              spec:
                strategy:
                  type: Recreate
                  rollingUpdate: null
  values:
    profiles:
      - feature-complete

    asHook: false

    images:
      sentry:
        repository: registry.vzkn.eu/containers/sentry-oidc
        tag: 26.5.2@sha256:eefbdb93331ecac0eb417ef1da9b125529275f95f80b625ba820ea052cf68186
        pullPolicy: IfNotPresent

    serviceAccount:
      enabled: true
      create: true
      name: sentry

    global:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      topologySpreadConstraints:
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/part-of: sentry
      priorityClassName: cluster-low

    user:
      create: true
      email: vrozaksen@protonmail.com
      existingSecret: sentry-secret
      existingSecretKey: ADMIN_PASSWORD

    auth:
      register: false

    system:
      adminEmail: vrozaksen@protonmail.com
      url: https://sentry.vzkn.eu
      public: false
      existingSecret: sentry-secret

    mail:
      backend: smtp
      useTls: false
      useSsl: false
      username: ""
      password: ""
      port: 25
      host: smtp-relay.network.svc.cluster.local
      from: noreply@vzkn.eu

    postgresql:
      enabled: false
    redis:
      enabled: false
    clickhouse:
      enabled: false
    zookeeper:
      enabled: false
    rabbitmq:
      enabled: false
    kafka:
      enabled: false
    nginx:
      enabled: false
    ingress:
      enabled: false
    pgbouncer:
      enabled: false

    externalPostgresql:
      host: pooler-sentry-rw.sentry.svc.cluster.local
      port: 5432
      username: sentry
      database: sentry
      existingSecret: postgres-sentry-app
      existingSecretKeys:
        password: password

    externalRedis:
      host: sentry-dragonfly.sentry.svc.cluster.local
      port: 6379
      db: 0

    externalClickhouse:
      host: clickhouse-sentry.sentry.svc.cluster.local
      tcpPort: 9000
      httpPort: 8123
      username: sentry
      database: default
      singleNode: true
      existingSecret: clickhouse-sentry-secret
      existingSecretKey: password

    externalKafka:
      cluster:
        - host: kafka-sentry-kafka-bootstrap.sentry.svc.cluster.local
          port: 9092
      security:
        protocol: SASL_PLAINTEXT
      sasl:
        mechanism: SCRAM-SHA-512
        existingSecret: sentry-sasl
        existingSecretKeys:
          username: username
          password: password
      compression:
        type: lz4
      message:
        max:
          bytes: 50000000
      socket:
        timeout:
          # librdkafka default; 1000 timed out group-join → empty assignment
          # → health.txt never written → startup probe kills consumers
          ms: 60000
      provisioning:
        enabled: true
        replicationFactor: 1
        numPartitions: 1
        topicctl:
          clusterName: kafka-sentry
          environment: production
          region: vzkn-eu

    route:
      main:
        enabled: true
        hostnames:
          - sentry.vzkn.eu
        annotations:
          gatus.home-operations.com/endpoint: |-
            group: services
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
      httpRedirect:
        enabled: true
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: http

    filestore:
      backend: s3
      s3:
        bucketName: sentry
        endpointUrl: https://api.s3.vzkn.eu
        region: eu-central-1
        existingSecret: sentry-secret
        accessKeyIDKey: s3-access-key-id
        secretAccessKeyKey: s3-secret-access-key

    sentry:
      singleOrganization: true
      features:
        orgSubdomains: false
        enableProfiling: true
        enableSessionReplay: false
        enableFeedback: true
        enableSpan: false
        enableUptime: false
      web:
        replicas: 1
        env:
          - name: OIDC_SCOPE
            value: "openid email profile"
          - name: OIDC_DOMAIN
            value: "https://idm.vzkn.eu/oauth2/openid/sentry"
          - name: OIDC_ISSUER
            value: "Kanidm"
      worker:
        replicas: 1
      taskWorker:
        concurrency: 4
      taskBroker:
        replicas: 1
        persistence:
          enabled: true
          size: 1Gi
          storageClass: ceph-block
      cleanup:
        days: 90
        schedule: "0 4 * * *"
      ingestFeedback:
        enabled: true

    relay:
      replicas: 1

    vroom:
      replicas: 1

    symbolicator:
      enabled: true
      api:
        usedeployment: false
        replicas: 1
        persistence:
          enabled: true
          existingClaim: sentry-symbolicator-pvc
          accessModes:
            - "ReadWriteOnce"
          storageClassName: ceph-block
          size: 50Gi
        config: |-
          cache_dir: "/data"
          bind: "0.0.0.0:3021"
          logging:
            level: "warn"
          metrics:
            statsd: "sentry-metrics:9125"
            prefix: "symbolicator"
          sentry_dsn: null
          connect_to_reserved_ips: true

    snuba:
      rustConsumer: true
      api:
        replicas: 1

    uptimeChecker:
      enabled: false

    launchpadTaskWorker:
      enabled: false

    hooks:
      enabled: true
      activeDeadlineSeconds: 1800

    # ====================================================================
    # Prometheus exporter — deploys statsd-exporter (port 9125 statsd,
    # 9102 /metrics). Sentry web/worker/relay/snuba statsd targets it via
    # SENTRY_METRICS_BACKEND. ServiceMonitor scrapes /metrics → Prom.
    # ====================================================================
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        scrapeInterval: 30s

    config:
      sentryConfPy: |-
        CSRF_TRUSTED_ORIGINS = ["https://sentry.vzkn.eu"]
        USE_X_FORWARDED_HOST = True
        SECURE_PROXY_SSL_HEADER = ('HTTP_X_FORWARDED_PROTO', 'https')
        CSRF_COOKIE_SECURE = True
        SESSION_COOKIE_SECURE = True
        SOCIAL_AUTH_REDIRECT_IS_HTTPS = True
        SENTRY_BEACON = False
        CSRF_TRUSTED_ORIGINS += ["null"]

        SENTRY_RELAY_OPEN_REGISTRATION = False
        SENTRY_RELAY_WHITELIST_PK = []

        # ====================================================================
        # sentry-auth-oidc plugin config (module: oidc)
        # Plugin reads via getattr(django.conf.settings, "OIDC_*", None),
        # NOT os.environ. Env vars from kanidm-sentry-oidc Secret + web.env are
        # bridged into Django settings here (sentryConfPy IS the settings module).
        # OIDC_DOMAIN points at Kanidm discovery; plugin fetches
        # /.well-known/openid-configuration and overrides auth/token/userinfo
        # endpoints + issuer. NOTE: plugin has NO PKCE — Kanidm `sentry` client
        # must allow disabling PKCE (allow-insecure-client-disable-pkce).
        # Without this bridge: ISSUER=None → provider.name=None → UI crash on
        # /settings/sentry/auth/ (providerItem.tsx tries .replace() on null).
        # ====================================================================
        import os
        OIDC_CLIENT_ID = os.environ.get("OIDC_CLIENT_ID")
        OIDC_CLIENT_SECRET = os.environ.get("OIDC_CLIENT_SECRET")
        OIDC_SCOPE = os.environ.get("OIDC_SCOPE", "openid email")
        OIDC_DOMAIN = os.environ.get("OIDC_DOMAIN")
        OIDC_ISSUER = os.environ.get("OIDC_ISSUER", "OIDC")

        # SSRF protection — Sentry blocks outgoing HTTP to private IPs to prevent
        # internal network scanning. Kanidm (idm.vzkn.eu) lives at 10.10.0.91
        # which is in 10.0.0.0/8 → OIDC discovery/token exchange fails with
        # RestrictedIPAddress. Remove 10.0.0.0/8 from blocklist for cluster-internal
        # OIDC. Acceptable for solo homelab; review if exposing to other users.
        SENTRY_DISALLOWED_IPS = [ip for ip in SENTRY_DISALLOWED_IPS if ip != "10.0.0.0/8"]

        # GitHub App stub — wired only when env vars present (Phase 5 Forgejo migration)
        if os.environ.get("GITHUB_APP_ID"):
            SENTRY_OPTIONS["github-app.id"] = int(os.environ["GITHUB_APP_ID"])
            SENTRY_OPTIONS["github-app.name"] = os.environ.get("GITHUB_APP_NAME", "sentry-vzkn-eu")
            SENTRY_OPTIONS["github-app.client-id"] = os.environ.get("GITHUB_CLIENT_ID", "")
            SENTRY_OPTIONS["github-app.client-secret"] = os.environ.get("GITHUB_CLIENT_SECRET", "")
            SENTRY_OPTIONS["github-app.webhook-secret"] = os.environ.get("GITHUB_WEBHOOK_SECRET", "")
            private_key = os.environ.get("GITHUB_PRIVATE_KEY", "")
            SENTRY_OPTIONS["github-app.private-key"] = private_key.replace("\\n", "\n")

        # ====================================================================
        # FEATURE FLAGS — audited against Sentry 26.5.0
        # (src/sentry/features/{permanent,temporary}.py)
        #
        # Only flags that either:
        #  (a) flip the upstream default, OR
        #  (b) guard against likely future flip of an off-by-default feature
        #      we don't want silently enabled (AI/Seer, replay, ourlogs).
        # Anything not listed accepts upstream default. Re-audit on chart bump.
        # ====================================================================

        # ---- Flip OFF: defaults True upstream, we want False ----

        # Auth: SAML2 default ON (we use OIDC via sentry-auth-oidc plugin in
        # custom image; creds from kanidm-sentry-oidc Secret + web.env block)
        SENTRY_FEATURES["organizations:sso-saml2"] = False

        # Brand UI we don't use (default True in 26.5.0)
        SENTRY_FEATURES["organizations:insight-modules"] = False
        SENTRY_FEATURES["organizations:dashboards-basic"] = False
        SENTRY_FEATURES["organizations:dashboards-edit"] = False

        # Built-in uptime monitoring (Gatus does this)
        SENTRY_FEATURES["organizations:uptime"] = False

        # External relay registration (we run only the bundled relay)
        SENTRY_FEATURES["organizations:relay"] = False

        # Event forwarding to external sinks (not needed)
        SENTRY_FEATURES["organizations:data-forwarding"] = False

        # Enterprise integrations (large, default True in permanent.py)
        SENTRY_FEATURES["organizations:integrations-chat-unfurl"] = False
        SENTRY_FEATURES["organizations:integrations-codeowners"] = False
        SENTRY_FEATURES["organizations:integrations-enterprise-alert-rule"] = False
        SENTRY_FEATURES["organizations:integrations-enterprise-incident-management"] = False
        SENTRY_FEATURES["organizations:integrations-event-hooks"] = False
        SENTRY_FEATURES["organizations:integrations-incident-management"] = False

        # ---- Flip ON: defaults False upstream, we want True ----

        # Alerting (incidents/anomaly default False in 26.5.0)
        SENTRY_FEATURES["organizations:incidents"] = True
        SENTRY_FEATURES["organizations:anomaly-detection-alerts"] = True

        # Profiling — vroxide ADR-0008 toggle (defaults False)
        SENTRY_FEATURES["organizations:profiling"] = True
        SENTRY_FEATURES["organizations:profiling-view"] = True
        SENTRY_FEATURES["organizations:continuous-profiling"] = True

        # Issue Views (saved searches v2, default False)
        SENTRY_FEATURES["organizations:issue-views"] = True

        # Per-project utilities (defaults False in temporary.py)
        SENTRY_FEATURES["projects:custom-inbound-filters"] = True
        SENTRY_FEATURES["projects:discard-groups"] = True
        SENTRY_FEATURES["projects:servicehooks"] = True

        # ---- Guards: default False today, paranoia against future flip ----
        # Audit of features/{permanent,temporary}.py at 26.5.0 confirms each
        # is currently False. NOTE: there are ~25 more seer-* sub-flags
        # (seer-night-shift, seer-explorer-thinking-blocks, seer-mirror, etc.)
        # — not enumerating because gen-ai-features=False + seer-{explorer,
        # autopilot}=False gates the AI plumbing in practice. Re-audit on
        # chart bump (git diff features/ between releases).

        # Master AI/Seer gates
        SENTRY_FEATURES["organizations:gen-ai-features"] = False
        SENTRY_FEATURES["organizations:ai-issue-detection"] = False
        SENTRY_FEATURES["organizations:autofix-on-explorer"] = False
        SENTRY_FEATURES["organizations:seer-explorer"] = False
        SENTRY_FEATURES["organizations:seer-autopilot"] = False
        SENTRY_FEATURES["organizations:replay-ai-summaries"] = False

        # AI-via-integrations (Claude / GitHub Copilot adapters phone out)
        SENTRY_FEATURES["organizations:integrations-claude-code"] = False
        SENTRY_FEATURES["organizations:integrations-github-copilot-agent"] = False

        # External data exfil
        SENTRY_FEATURES["organizations:codecov-integration"] = False

        # Replay / OurLogs storage explosion sinks
        SENTRY_FEATURES["organizations:session-replay"] = False
        SENTRY_FEATURES["organizations:session-replay-ui"] = False
        SENTRY_FEATURES["organizations:ourlogs-enabled"] = False
        SENTRY_FEATURES["organizations:ourlogs-ingestion"] = False

        # Server-side sampling rules (could silently drop our events)
        SENTRY_FEATURES["organizations:dynamic-sampling"] = False

        # Insights/spans (chart consumers spool up if any flip ON)
        SENTRY_FEATURES["organizations:span-stats"] = False
        SENTRY_FEATURES["organizations:spans-usage-tracking"] = False

        # Chart rendering in alerts (sentry-internal chartcuterie sidecar)
        SENTRY_FEATURES["organizations:metric-alert-chartcuterie"] = False

        import os
        os.environ.setdefault("AWS_REQUEST_CHECKSUM_CALCULATION", "when_required")
        os.environ.setdefault("AWS_RESPONSE_CHECKSUM_VALIDATION", "when_required")
        if os.environ.get("S3_ACCESS_KEY_ID"):
            os.environ.setdefault("AWS_ACCESS_KEY_ID", os.environ["S3_ACCESS_KEY_ID"])
        if os.environ.get("S3_SECRET_ACCESS_KEY"):
            os.environ.setdefault("AWS_SECRET_ACCESS_KEY", os.environ["S3_SECRET_ACCESS_KEY"])

        SENTRY_OPTIONS["filestore.options"] = {
            "access_key": os.environ.get("S3_ACCESS_KEY_ID", ""),
            "secret_key": os.environ.get("S3_SECRET_ACCESS_KEY", ""),
            "bucket_name": "sentry",
            "endpoint_url": "https://api.s3.vzkn.eu",
            "region_name": "eu-central-1",
            "addressing_style": "path",
            "signature_version": "s3v4",
        }

        SENTRY_OPTIONS["chart-rendering.storage.backend"] = "s3"
        SENTRY_OPTIONS["chart-rendering.storage.options"] = SENTRY_OPTIONS["filestore.options"]
        SENTRY_OPTIONS["configurations.storage.backend"] = "s3"
        SENTRY_OPTIONS["configurations.storage.options"] = SENTRY_OPTIONS["filestore.options"]

        # ====================================================================
        # Internal observability — pipe statsd to chart-deployed statsd-exporter
        # (release `sentry-metrics` service on port 9125 UDP). statsd-exporter
        # ServiceMonitor scraped by kube-prometheus → Grafana.
        # Without this Sentry uses dummy backend — zero internal metrics
        # exported. Pattern: SENTRY_METRICS_BACKEND from sentry/conf/server.py.
        # ====================================================================
        SENTRY_METRICS_BACKEND = "sentry.metrics.statsd.StatsdMetricsBackend"
        SENTRY_METRICS_OPTIONS = {
            "host": "sentry-metrics",
            "port": 9125,
        }
        SENTRY_METRICS_SAMPLE_RATE = 1.0
