---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kopiur.home-operations.com/clusterrepository_v1alpha1.json
# Primary backup repository - seeded from the volsync repo by
# RepositoryReplication (no create block: it must already exist)
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: garage
spec:
  allowedNamespaces:
    all: true
  backend:
    s3:
      bucket: kopiur
      endpoint: api.s3.vzkn.eu
      region: eu-central-1
      auth:
        secretRef:
          name: kopiur-repository-secret
          namespace: kopiur-system
  credentialProjection:
    allowed: true
  encryption:
    passwordSecretRef:
      name: kopiur-repository-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  moverDefaults:
    cache:
      capacity: 10Gi
      mode: Persistent
      storageClassName: local-hostpath
    podSecurityContext:
      fsGroup: 100
    securityContext:
      runAsUser: 1000
      runAsGroup: 100
    ttlSecondsAfterFinished: 86400
  scheduleDefaults:
    timezone: Europe/Warsaw
