---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nextcloud
spec:
  components:
    - ../../../../components/cnpg/restore  # PostgreSQL cluster
    - ../../../../components/dragonfly  # Redis cache (nextcloud-dragonfly)
    - ../../../../components/zeroscaler  # Scale down on NFS mount issues
    - ../../../../components/kopiur  # Backup config/apps volume
  dependsOn:
    - name: dragonfly-operator
      namespace: database
    - name: plugin-barman-cloud
      namespace: database
    - name: prometheus-adapter
      namespace: observability
    - name: rook-ceph-cluster
      namespace: rook-ceph
  healthCheckExprs:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      failed: status.phase != 'Ready'
      current: status.phase == 'Ready'
  interval: 1h
  path: ./kubernetes/apps/self-hosted/nextcloud/app
  postBuild:
    substitute:
      APP: *app
      NS: &ns self-hosted
      CNPG_SIZE: 10Gi  # PostgreSQL PVC size
      KOPIUR_CAPACITY: 100Gi  # Config/apps backup size (thumbnails, etc)
      KOPIUR_GID: "100"
      KOPIUR_UID: "1000"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: false
