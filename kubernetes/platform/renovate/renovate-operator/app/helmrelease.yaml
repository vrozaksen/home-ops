---
# yaml-language-server: $schema=https://schemas.vzkn.eu/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: renovate-operator
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.8.0
  url: oci://ghcr.io/mogenius/helm-charts/renovate-operator
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name renovate-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  values:
    fullnameOverride: *name
    route:
      enabled: true
      hostnames:
        - renovate.vzkn.eu
      parentRefs:
        - name: envoy-internal
          namespace: network
    webhook:
      enabled: true
    config:
      deleteSuccessfulJobs: true
      jobTTLSecondsAfterFinished: 3600
      globalParallelismLimit: 4
      logStorage:
        mode: memory
      forwardCacheToJobs: true
    valkey:
      enabled: false
      existingSecret: renovate-operator-valkey
      existingSecretKey: valkey-url
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      dashboard:
        enabled: true
        labels:
          grafana_dashboard: "true"
        grafanaDashboard:
          allowCrossNamespaceImport: true
          instanceSelector:
            matchLabels:
              grafana.internal/instance: grafana
    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        memory: 256Mi
