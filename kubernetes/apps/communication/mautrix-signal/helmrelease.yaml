---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mautrix-signal
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      mautrix-signal:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          bootstrap:
            image:
              repository: dock.mau.dev/mautrix/signal
              tag: v0.2605.0
            command:
              - "/bin/sh"
              - "-c"
            args:
              - |
                set -e
                cp /template/config.yaml /shared/config.yaml
                chmod 600 /shared/config.yaml
                if [ ! -f /data/registration.yaml ]; then
                  echo "Generating registration.yaml..."
                  /usr/bin/mautrix-signal -g -c /shared/config.yaml -r /data/registration.yaml
                  echo "Done. Extract via: kubectl exec -n communication deploy/mautrix-signal -c app -- cat /data/registration.yaml"
                else
                  echo "registration.yaml already exists, skipping."
                fi
            env:
              MAUTRIX_SIGNAL_DATABASE__URI:
                valueFrom:
                  secretKeyRef:
                    name: postgres-mautrix-signal-app
                    key: uri
            envFrom:
              - secretRef:
                  name: mautrix-signal-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        containers:
          app:
            image:
              # renovate: datasource=docker depName=dock.mau.dev/mautrix/signal
              repository: dock.mau.dev/mautrix/signal
              tag: v0.2605.0
            command:
              - "/usr/bin/mautrix-signal"
            args:
              - "-c"
              - "/shared/config.yaml"
              - "-r"
              - "/data/registration.yaml"
            env:
              MAUTRIX_SIGNAL_DATABASE__URI:
                valueFrom:
                  secretKeyRef:
                    name: postgres-mautrix-signal-app
                    key: uri
            envFrom:
              - secretRef:
                  name: mautrix-signal-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 29328
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness: *probes
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 384Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1337
        runAsGroup: 1337
        fsGroup: 1337
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: mautrix-signal
        ports:
          http:
            port: 29328

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
            subPath: data
      shared:
        type: emptyDir
        globalMounts:
          - path: /shared
      template:
        type: configMap
        name: mautrix-signal-config
        advancedMounts:
          mautrix-signal:
            copy-config:
              - path: /template
                readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
