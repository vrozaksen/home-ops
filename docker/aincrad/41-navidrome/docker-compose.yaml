---
name: navidrome

services:
  navidrome:
    # renovate: datasource=docker depName=ghcr.io/navidrome/navidrome
    image: ghcr.io/navidrome/navidrome:0.63.1
    container_name: navidrome
    restart: unless-stopped
    depends_on:
      # Block startup until .ndp files are present in /config/plugins.
      navidrome-plugins:
        condition: service_completed_successfully
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/navidrome.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:8080]"
    user: "1000:100"
    environment:
      ND_MUSICFOLDER: /music
      ND_DATAFOLDER: /config
      ND_CACHEFOLDER: /config/cache
      ND_LOGLEVEL: info
      ND_BASEURL: https://music.vzkn.eu
      ND_PORT: "8080"
      ND_ENABLEINSIGHTSCOLLECTOR: "false"
      ND_COVERJPEGQUALITY: "100"
      ND_DEFAULTTHEME: Spotify-ish
      ND_ENABLEDOWNLOADS: "true"
      ND_ENABLEEXTERNALSERVICES: "true"
      ND_ENABLEGRAVATAR: "false"
      ND_ENABLESHARING: "true"
      ND_ENABLESTARRATING: "true"
      ND_IMAGECACHESIZE: 1GB
      ND_PROMETHEUS_ENABLED: "true"
      ND_PROMETHEUS_METRICSPATH: /metrics
      ND_SCANNER_SCHEDULE: "@every 1h"
      ND_SEARCHFULLSTRING: "true"
      ND_TRANSCODINGCACHESIZE: 1GB
      ND_SUBSONIC_ARTISTPARTICIPATIONS: "true"
      # Plugins (WASM/Extism sandbox). .ndp files fetched by navidrome-plugins service.
      ND_PLUGINS_ENABLED: "true"
      ND_PLUGINS_AUTORELOAD: "true"
      # Metadata agent priority: plugins first, then built-ins. artist-nfo-metadata needs the
      # `library` permission — approve it once in UI (Plugins > artist-nfo-metadata).
      ND_AGENTS: "artist-nfo-metadata,apple-music,lastfm,spotify,deezer"
      # Lyrics: embedded/.lrc win, nd-lyrics as fallback. WebUI doesn't render plugin lyrics;
      # use a Subsonic client (Symfonium/Feishin). /music is read-only so .lrc are never written.
      ND_LYRICSPRIORITY: "embedded,.lrc,nd-lyrics"
      TZ: Europe/Warsaw
    ports:
      # Published so Caddy reaches it at 10.10.0.11:8080 (host-IP proxying).
      - "8080:8080"
    volumes:
      - /mnt/blaze/appdata/navidrome:/config
      - /mnt/cache/z_media/music:/music:ro
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "-qO-"
        - "http://127.0.0.1:8080/ping"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Oneshot: download plugin .ndp bundles into /config/plugins before navidrome starts.
  # Versions are Renovate-managed; download failures keep the last-known-good file.
  navidrome-plugins:
    # renovate: datasource=docker depName=docker.io/curlimages/curl
    image: docker.io/curlimages/curl:8.21.0
    container_name: navidrome-plugins
    user: "1000:100"
    restart: "no"
    environment:
      # renovate: datasource=github-releases depName=navidrome/apple-music-plugin
      APPLE_MUSIC_VERSION: v0.2.0
      # renovate: datasource=github-releases depName=J0R6IT0/navidrome-lyrics-plugin
      ND_LYRICS_VERSION: v7.0.0
      # renovate: datasource=github-releases depName=metalheim/navidrome-plugin-artist-nfo-metadata
      ARTIST_NFO_VERSION: v1.3.0
      # renovate: datasource=github-releases depName=NeptuneHub/AudioMuse-AI-NV-plugin
      AUDIOMUSE_PLUGIN_VERSION: v9
    volumes:
      - /mnt/blaze/appdata/navidrome:/config
    # Script passed as a single list element so compose doesn't shlex-split it.
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -u
        mkdir -p /config/plugins
        # Managed set; any other *.ndp gets pruned so removing a line here removes the plugin.
        KEEP="apple-music.ndp nd-lyrics.ndp artist-nfo-metadata.ndp audiomuseai.ndp"
        dl() {
          url="$$1"; out="/config/plugins/$$2"
          echo "fetch $$2 ($$url)"
          if curl -fsSL "$$url" -o "$$out.tmp"; then
            mv "$$out.tmp" "$$out"
          else
            rm -f "$$out.tmp"
            echo "WARN: download failed for $$2; keeping existing copy if present"
          fi
        }
        dl "https://github.com/navidrome/apple-music-plugin/releases/download/$${APPLE_MUSIC_VERSION}/apple-music.ndp" apple-music.ndp
        dl "https://github.com/J0R6IT0/navidrome-lyrics-plugin/releases/download/$${ND_LYRICS_VERSION}/nd-lyrics.ndp" nd-lyrics.ndp
        dl "https://github.com/metalheim/navidrome-plugin-artist-nfo-metadata/releases/download/$${ARTIST_NFO_VERSION}/artist-nfo-metadata.ndp" artist-nfo-metadata.ndp
        dl "https://github.com/NeptuneHub/AudioMuse-AI-NV-plugin/releases/download/$${AUDIOMUSE_PLUGIN_VERSION}/audiomuseai.ndp" audiomuseai.ndp
        for f in /config/plugins/*.ndp; do
          [ -e "$$f" ] || continue
          case " $$KEEP " in *" $${f##*/} "*) ;; *) echo "prune $${f##*/}"; rm -f "$$f" ;; esac
        done
        echo "plugins ready"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: aincrad
    external: true
