---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name konflate-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/flux-system/konflate
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: flux-system
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          KONFLATE_WEBHOOK_SECRET: '{{ .KONFLATE_WEBHOOK_SECRET.Value }}'
          KONFLATE_APP_CLIENT_ID: '{{ .KONFLATE_APP_CLIENT_ID.Value }}'
          KONFLATE_APP_PRIVATE_KEY: '{{ .KONFLATE_APP_PRIVATE_KEY.Value }}'
