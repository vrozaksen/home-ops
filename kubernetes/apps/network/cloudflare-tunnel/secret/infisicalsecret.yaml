---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name cloudflare-tunnel
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/network/cloudflare-tunnel
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: network
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          TUNNEL_TOKEN: |
            {{ toJson (dict "a" .CLOUDFLARE_ACCOUNT_TAG.Value "t" .CLOUDFLARE_TUNNEL_ID.Value "s" .CLOUDFLARE_TUNNEL_SECRET.Value) | b64enc }}
          CLOUDFLARE_TUNNEL_ID: '{{ .CLOUDFLARE_TUNNEL_ID.Value }}'
