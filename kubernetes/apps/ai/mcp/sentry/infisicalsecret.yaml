---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name sentry-mcp-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /ai/mcp/sentry
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: ai
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          SENTRY_AUTH_TOKEN: '{{ .SENTRY_AUTH_TOKEN.Value }}'
