---
# NOTE: Multi-source - configure Secret Imports in Infisical for: authentik, coturn
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name continuwuity-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/communication/continuwuity
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: communication
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          ldap-password: '{{ .LDAP_SERVICE_PASSWORD.Value }}'
          turn-secret: '{{ .TURN_SECRET.Value }}'
