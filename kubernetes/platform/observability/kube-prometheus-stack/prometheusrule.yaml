---
# yaml-language-server: $schema=https://schemas.vzkn.eu/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cluster-capacity-rules
spec:
  groups:
    - name: cluster-capacity.rules
      rules:
        - alert: NodeMemoryPressure
          expr: |-
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
          for: 10m
          annotations:
            summary: >-
              Node {{ $labels.instance }} memory >85% for 10m ({{ $value | humanizePercentage }})
          labels:
            severity: warning

        - alert: NodeMemoryStalled
          # PSI full-stall, not a % threshold: 12Gi CP nodes sit at >93% used
          # from apiserver working set while nothing OOMs. Real pre-OOM pressure
          # shows as the kernel spending time with ALL tasks stalled on reclaim.
          expr: |-
            rate(node_pressure_memory_stalled_seconds_total[5m]) > 0.10
          for: 2m
          annotations:
            summary: >-
              Node {{ $labels.instance }} under real memory pressure — {{ $value | humanizePercentage }} of time fully stalled on reclaim (OOM precursor)
          labels:
            severity: critical

        - alert: KubeAPIServerHighMemory
          expr: |-
            container_memory_working_set_bytes{container="kube-apiserver"} > 6e9
          for: 15m
          annotations:
            summary: >-
              kube-apiserver on {{ $labels.node }} using {{ $value | humanize1024 }}B — approaching OOM on 8.8Gi allocatable CP
          labels:
            severity: warning
