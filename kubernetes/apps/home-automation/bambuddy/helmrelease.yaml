---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bambuddy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      bambuddy:
        containers:
          app:
            image:
              repository: ghcr.io/maziggy/bambuddy
              tag: 0.2.4
            env:
              PORT: &httpPort 8000
              HA_URL: https://hass.vzkn.eu
              HA_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: bambuddy-secret
                    key: HA_TOKEN
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *httpPort
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: bambuddy
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: *httpPort
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            group: home-automation
        hostnames:
          - bambuddy.vzkn.eu
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: bambuddy
        advancedMounts:
          bambuddy:
            app:
              - path: /app/data
                subPath: data
      tmpfs:
        type: emptyDir
        advancedMounts:
          bambuddy:
            app:
              - path: /tmp
                subPath: tmp
              - path: /app/logs
                subPath: logs
