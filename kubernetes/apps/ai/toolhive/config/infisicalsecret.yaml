---
# Authentik OIDC client secret + VirtualMCPServer auth-server signing keys.
# Infisical paths:
#   /terraform/authentik/oidc/MCP_GATEWAY_CLIENT_SECRET  (terraform-managed)
#   /kubernetes/ai/toolhive/{VMCP_SIGNING_KEY, VMCP_HMAC_KEY}  (rand 32 bytes hex each)
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name vmcp-authentik-oidc
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /terraform/authentik/oidc
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: ai
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          client-secret: '{{ .MCP_GATEWAY_CLIENT_SECRET.Value }}'
---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name vmcp-auth-server-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/ai/toolhive
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: ai
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          signing-key: '{{ .VMCP_SIGNING_KEY.Value }}'
          hmac-key: '{{ .VMCP_HMAC_KEY.Value }}'
