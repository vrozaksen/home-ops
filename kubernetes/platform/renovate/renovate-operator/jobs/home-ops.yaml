---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  # Explicit allowlist: only repos still primary on GitHub.
  # Forgejo-migrated repos (renovate-config, vrozaksen, vzkn-eu, nix-config, ...)
  # are scanned by the forgejo RenovateJob — having both jobs scan the same
  # content (via push-mirror) causes force-push lease conflicts.
  discoveryFilters:
    - "vrozaksen/home-ops"
  provider:
    name: github
  image: ghcr.io/renovatebot/renovate:43.272.8@sha256:ee38fed0de334fad155f7d93f0b8943ef40c9b1ee1c39113fc1b3c87b58454a1
  schedule: "0 * * * *"
  parallelism: 3
  # Operator mints + refreshes RENOVATE_TOKEN from the GitHub App natively (beta).
  githubAppReference:
    secretName: repo-killer-app-secret
    appIdSecretKey: GITHUB_APP_ID
    installationIdSecretKey: INSTALL_ID
    pemSecretKey: private-key.pem
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  webhook:
    enabled: true
    authentication:
      enabled: false
