---
# yaml-language-server: $schema=https://schemas.vzkn.eu/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: lean-ctx
spec:
  image: registry.vzkn.eu/containers/lean-ctx:3.6.26
  transport: streamable-http
  mcpPort: 8080
  groupRef:
    name: mcp-tools
  permissionProfile:
    type: builtin
    name: network
  env:
    - name: HOME
      value: /tmp
    - name: XDG_CONFIG_HOME
      value: /tmp
  podTemplateSpec:
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lean-ctx
      containers:
        - name: mcp
          args:
            - serve
            - --port=8081
          volumeMounts:
            - name: data
              mountPath: /tmp
        - name: socat
          image: docker.io/alpine/socat:1.8.0.3
          args:
            - TCP-LISTEN:8080,bind=0.0.0.0,reuseaddr,fork
            - TCP:127.0.0.1:8081
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            capabilities:
              drop:
                - "ALL"
