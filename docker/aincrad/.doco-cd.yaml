---
name: aincrad
reference: refs/heads/main
working_dir: ./docker/aincrad
auto_discovery:
  enabled: true
  depth: 1
  delete: true
reconciliation:
  enabled: true
  interval: 3600
  # NOTE: external_secrets are declared per-stack (nested .doco-cd.yaml), NOT here.
  # doco-cd resolves every root-declared secret for EVERY auto-discovered stack
  # regardless of usage; a global block = stacks × secrets Infisical calls per
  # poll → 429 rate-limit. Per-stack keeps it to only what each stack consumes.
