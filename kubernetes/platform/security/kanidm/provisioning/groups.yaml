---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kanidm-provision-groups
  labels:
    kanidm_config: "1"
  annotations:
    reloader.stakater.com/match: "true"
data:
  # Mirrors the terraform/authentik group hierarchy. Members are added during bootstrap
  # (kanidm group add-members ...) or declared here once usernames are known.
  groups.json: |-
    {
      "groups": {
        "pending":        { "present": true, "members": [], "overwriteMembers": false },
        "users":          { "present": true, "members": [], "overwriteMembers": false },
        "admins":         { "present": true, "members": [], "overwriteMembers": false },
        "ff":             { "present": true, "members": [], "overwriteMembers": false },
        "household":      { "present": true, "members": [], "overwriteMembers": false }
      },
      "persons": {},
      "systems": { "oauth2": {} }
    }
