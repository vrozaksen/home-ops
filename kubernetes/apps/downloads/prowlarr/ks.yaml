---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app prowlarr
spec:
  components: []
  # - ../../../components/ext-auth
  dependsOn:
    - name: authentik
      namespace: security
    - name: postgres-arr
      namespace: downloads
  interval: 1h
  path: ./kubernetes/apps/downloads/prowlarr
  postBuild:
    substitute:
      APP: *app
      NS: &ns downloads
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: false
