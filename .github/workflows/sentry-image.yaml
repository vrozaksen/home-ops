---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Sentry Image

on:
  push:
    branches:
      - main
    paths:
      - docker/sentry/**
      - .github/workflows/sentry-image.yaml
  pull_request:
    branches:
      - main
    paths:
      - docker/sentry/**
      - .github/workflows/sentry-image.yaml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Sentry Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Extract Sentry version
        id: version
        run: |
          SENTRY_VERSION=$(awk -F= '/^ARG SENTRY_VERSION=/ {print $2}' docker/sentry/Dockerfile)
          OIDC_VERSION=$(awk -F= '/^ARG SENTRY_AUTH_OIDC_VERSION=/ {print $2}' docker/sentry/Dockerfile)
          echo "sentry=${SENTRY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "oidc=${OIDC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${SENTRY_VERSION}-oidc${OIDC_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: docker/sentry
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/vrozaksen/sentry-oidc:${{ steps.version.outputs.tag }}
            ghcr.io/vrozaksen/sentry-oidc:${{ steps.version.outputs.sentry }}
            ghcr.io/vrozaksen/sentry-oidc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
