---
# yaml-language-server: $schema=https://schemas.vzkn.eu/gateway.envoyproxy.io/securitypolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: alertmanager
spec:
  oidc:
    provider:
      issuer: https://idm.vzkn.eu/oauth2/openid/alertmanager
    clientID: alertmanager
    clientSecret:
      name: kanidm-alertmanager-oidc  # secret written by kanidm-provision, key client-secret
    redirectURL: https://alertmanager.vzkn.eu/oauth2/callback
    logoutPath: /logout
    cookieDomain: alertmanager.vzkn.eu
    scopes:
      - "openid"
      - "email"
      - "profile"
      - "groups"
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: kube-prometheus-stack-alertmanager
