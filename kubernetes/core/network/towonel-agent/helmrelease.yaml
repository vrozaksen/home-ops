---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: towonel-agent
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        topology.kubernetes.io/zone: worker
    controllers:
      towonel-agent:
        type: deployment
        replicas: 2
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          name: towonel-agent
        containers:
          app:
            image:
              # renovate: datasource=docker depName=codeberg.org/towonel/towonel-agent
              repository: codeberg.org/towonel/towonel-agent
              tag: 0.1.14
            env:
              NODE_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
              POD_NAMESPACE:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              RUST_LOG: info
              TOWONEL_AGENT_HEALTH_LISTEN_ADDR: 0.0.0.0:9090
              TOWONEL_AGENT_K8S_AUTODISCOVER: "true"
              TOWONEL_AGENT_SERVICES: '[{"hostname":"*.vzkn.eu","origin":"envoy-external.network.svc.cluster.local:443"},{"hostname":"vzkn.eu","origin":"envoy-external.network.svc.cluster.local:443"}]'
              TOWONEL_AGENT_TCP_SERVICES: '[{"name":"forgejo-ssh","origin":"forgejo-ssh.development.svc.cluster.local:22","listen_port":22},{"name":"forge-ssh","origin":"forge.development.svc.cluster.local:22","listen_port":2222},{"name":"stunner-turn-tcp","origin":"stunner.network.svc.cluster.local:3478","listen_port":3478},{"name":"stunner-turns-tcp","origin":"stunner.network.svc.cluster.local:5349","listen_port":5349},{"name":"mumble-tcp","origin":"mumble.communication.svc.cluster.local:64738","listen_port":64738}]'
              TOWONEL_AGENT_UDP_SERVICES: '[{"name":"stunner-turn-udp","origin":"stunner.network.svc.cluster.local:3478","listen_port":3478},{"name":"mumble-udp","origin":"mumble.communication.svc.cluster.local:64738","listen_port":64738}]'
              TOWONEL_IROH_RELAY_URLS: "https://relay.towonel.vzkn.eu/,https://relay.towonel.erwanleboucher.dev/,https://euc1-1.relay.n0.iroh-canary.iroh.link/"
            envFrom:
              - secretRef:
                  name: towonel-agent-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 9090
                  initialDelaySeconds: 2
                  periodSeconds: 2
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: towonel-agent
        ports:
          http:
            port: 9090
    serviceMonitor:
      app:
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
