---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  discoveryFilters:
    - "vrozaksen/*"
  provider:
    name: github
  image: ghcr.io/renovatebot/renovate:43.180.1@sha256:f4995fbc9aa6db6ccddbf242a136c4c27b753471cf1497deca9a933ee167f67b
  schedule: "0 * * * *"
  parallelism: 3
  secretRef: renovate-token
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  webhook:
    enabled: true
    authentication:
      enabled: false
