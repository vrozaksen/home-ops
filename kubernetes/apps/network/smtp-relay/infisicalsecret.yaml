---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name smtp-relay-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/network/smtp-relay
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: network
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          SMTP_RELAY_HOSTNAME: '{{ .SMTP_RELAY_HOSTNAME.Value }}'
          SMTP_RELAY_SERVER: '{{ .SMTP_RELAY_SERVER.Value }}'
          SMTP_RELAY_USERNAME: '{{ .SMTP_RELAY_USERNAME.Value }}'
          SMTP_RELAY_PASSWORD: '{{ .SMTP_RELAY_PASSWORD.Value }}'
