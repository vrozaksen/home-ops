---
# yaml-language-server: $schema=https://schemas.vzkn.eu/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: defectdojo
spec:
  interval: 1h
  url: https://raw.githubusercontent.com/DefectDojo/django-DefectDojo/helm-charts
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: defectdojo
spec:
  interval: 1h
  chart:
    spec:
      chart: defectdojo
      version: 1.9.28
      sourceRef:
        kind: HelmRepository
        name: defectdojo
  values:
    host: dd.vzkn.eu
    siteUrl: https://dd.vzkn.eu

    # Use external PostgreSQL (CNPG)
    postgresql:
      enabled: false
      auth:
        existingSecret: postgres-defectdojo-app
        secretKeys:
          userPasswordKey: password
        username: defectdojo
        database: defectdojo
    postgresServer: pooler-defectdojo-rw
    postgresPort: 5432

    # Use Dragonfly via the shared component
    valkey:
      enabled: false
      auth:
        existingSecret: defectdojo-valkey-specific
        existingSecretPasswordKey: valkey-password
    redisServer: defectdojo-dragonfly
    redisPort: 6379
    redisScheme: redis

    django:
      replicas: 1
      uwsgi:
        # Resource limits for Django app
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 2Gi

      extraEnv:
        # Authentik OIDC
        - name: DD_SOCIAL_AUTH_OIDC_ENABLED
          value: "True"
        - name: DD_SOCIAL_AUTH_OIDC_OIDC_ENDPOINT
          value: "https://sso.vzkn.eu/application/o/defectdojo/"
        - name: DD_SOCIAL_AUTH_OIDC_KEY
          valueFrom:
            secretKeyRef:
              name: defectdojo
              key: OIDC_CLIENT_ID
        - name: DD_SOCIAL_AUTH_OIDC_SECRET
          valueFrom:
            secretKeyRef:
              name: defectdojo
              key: OIDC_CLIENT_SECRET
        - name: DD_SOCIAL_AUTH_REDIRECT_IS_HTTPS
          value: "True"
        - name: DD_SOCIAL_AUTH_SHOW_LOGIN_FORM
          value: "False"
        - name: DD_SOCIAL_LOGIN_AUTO_REDIRECT
          value: "True"

    # Celery worker
    celery:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1Gi

    # Celery beat
    celerybeat:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi

    # DefectDojo site (nginx)
    # This serves static files and proxies to django
    site:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
    # No need for ingress as we use HTTPRoute
    ingress:
      enabled: false
