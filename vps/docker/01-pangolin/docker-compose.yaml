---
name: pangolin
services:
  pangolin:
    image: ghcr.io/fosrl/pangolin:1.16.2@sha256:06aad9971df1a72edf0bea07d64fa67daeb8ee84319faf6813850c43e950eaa5
    container_name: pangolin
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    volumes:
      - /opt/pangolin/config:/app/config
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:3001/api/v1/
      interval: 10s
      timeout: 10s
      retries: 15

  gerbil:
    image: ghcr.io/fosrl/gerbil:1.3.0@sha256:7d9732af74c5851dde4b39a69a0c5d25b2f86a44464ebe0a4f116280914a8b56
    container_name: gerbil
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 64m
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - /opt/pangolin/config:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - 51820:51820/udp
      - 21820:21820/udp
      - 443:443
      - 80:80

  traefik:
    image: docker.io/traefik:v3.6.10@sha256:c549d482c55d7a797398562064f35428cc53e748d84d7190997930e7b31bcc32
    container_name: traefik
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 64m
    env_file: /opt/pangolin/.env
    environment:
      OVH_ENDPOINT: ovh-eu
    network_mode: service:gerbil
    depends_on:
      crowdsec:
        condition: service_healthy
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - /opt/pangolin/config/letsencrypt:/letsencrypt
      - /opt/pangolin/config/traefik/logs:/var/log/traefik
      - /opt/pangolin/config/prometheus-htpasswd:/etc/traefik/prometheus-htpasswd:ro
    configs:
      - source: traefik_config
        target: /etc/traefik/traefik_config.yml
      - source: traefik_dynamic_config
        target: /etc/traefik/dynamic_config.yml

  crowdsec:
    command: -t
    image: ghcr.io/crowdsecurity/crowdsec:v1.7.6@sha256:63b595fef92de1778573b375897a45dd226637ee9a3d3db9f57ac7355c369493
    container_name: crowdsec
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    env_file: /opt/pangolin/.env
    environment:
      COLLECTIONS: crowdsecurity/traefik crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules crowdsecurity/http-cve crowdsecurity/base-http-scenarios crowdsecurity/linux
      ENROLL_INSTANCE_NAME: bifrost-crowdsec
      ENROLL_TAGS: docker
      GID: "1000"
      PARSERS: crowdsecurity/whitelists
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 30s
      test:
        - CMD
        - cscli
        - lapi
        - status
      timeout: 5s
    labels:
      - traefik.enable=false
    ports:
      - 6060:6060
    volumes:
      - /opt/crowdsec/config:/etc/crowdsec
      - /opt/crowdsec/data:/var/lib/crowdsec/data
      - /opt/pangolin/config/traefik/logs:/var/log/traefik
    configs:
      - source: crowdsec_acquis
        target: /etc/crowdsec/acquis.yaml
      - source: crowdsec_simulation
        target: /etc/crowdsec/simulation.yaml

  geoipupdate:
    image: ghcr.io/maxmind/geoipupdate:v7.1.1@sha256:faecdca22579730ab0b7dea5aa9af350bb3c93cb9d39845c173639ead30346d2
    container_name: geoipupdate
    restart: unless-stopped
    env_file: /opt/pangolin/.env
    environment:
      GEOIPUPDATE_EDITION_IDS: GeoLite2-Country GeoLite2-ASN
      GEOIPUPDATE_FREQUENCY: "72"
    volumes:
      - /opt/pangolin/config/GeoLite2:/usr/share/GeoIP

networks:
  default:
    driver: bridge
    name: pangolin

configs:
  traefik_config:
    file: ./config/traefik.yml
  traefik_dynamic_config:
    file: ./config/traefik_dynamic.yml
  crowdsec_acquis:
    file: ./config/crowdsec_acquis.yml
  crowdsec_simulation:
    file: ./config/crowdsec_simulation.yml
