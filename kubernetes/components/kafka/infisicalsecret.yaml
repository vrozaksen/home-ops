---
# Wrapper SASL secret consumed by:
#  1. Strimzi KafkaUser (BYO password — kept in sync with Sentry chart)
#  2. Sentry chart's externalKafka.sasl.existingSecret (needs both username + password keys)
# The chart-side need is what forces this wrapper: Strimzi's auto-generated
# secret only has `password` + `sasl.jaas.config`, no `username`, and the chart's
# topicctl provisioning job hard-requires `username` env from the same secret.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name ${APP}-sasl
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/${NS:=${APP}}/${APP}
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: ${NS:=${APP}}
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          mechanism: SCRAM-SHA-512
          username: ${APP}
          password: '{{ .SASL_PASSWORD.Value }}'
