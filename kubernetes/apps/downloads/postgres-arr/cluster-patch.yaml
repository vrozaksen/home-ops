---
# Adds spec.managed.roles to postgres-arr Cluster (generated by components/cnpg/initdb).
# Each role's password is read from a K8s secret materialized by InfisicalSecret
# from values pushed by InfisicalPushSecret using ClusterGenerator pg-password-64.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-${APP}  # literal — Flux postBuild substitutes ${APP}=arr later
spec:
  managed:
    # services preserved from cnpg/base — strategic merge for CRDs without
    # merge keys replaces the whole `managed` block, so we restate it here.
    services:
      disabledDefaultServices: ${CNPG_DISABLED_SERVICES:=['ro', 'r']}
    roles:
      - name: bazarr
        ensure: present
        login: true
        passwordSecret:
          name: postgres-arr-bazarr-credentials
      - name: lidarr
        ensure: present
        login: true
        passwordSecret:
          name: postgres-arr-lidarr-credentials
      - name: prowlarr
        ensure: present
        login: true
        passwordSecret:
          name: postgres-arr-prowlarr-credentials
      - name: radarr
        ensure: present
        login: true
        passwordSecret:
          name: postgres-arr-radarr-credentials
      - name: sonarr
        ensure: present
        login: true
        passwordSecret:
          name: postgres-arr-sonarr-credentials
