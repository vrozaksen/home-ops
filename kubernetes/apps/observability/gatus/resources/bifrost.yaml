---
endpoints:
  - name: bifrost | ping
    group: vps
    url: icmp://${VPS_IP}
    interval: 1m
    ui:
      hide-url: true
      hide-hostname: true
    conditions:
      - "[CONNECTED] == true"

  - name: bifrost | edge
    group: vps
    url: https://twnl.vzkn.eu
    interval: 1m
    ui:
      hide-url: true
    conditions:
      - "[STATUS] < 500"
      - "[CERTIFICATE_EXPIRATION] > 72h"

  # Push our liveness to bifrost gatus so it can alert via Pushover
  # if the cluster gatus stops pushing (independent alert path).
  - name: bifrost | heartbeat push
    group: vps
    url: https://bifrost-gatus.vzkn.eu/api/v1/endpoints/home_heartbeat/external?token=${BIFROST_HEARTBEAT_TOKEN}
    method: POST
    body: '{"success": true, "duration": "1ms"}'
    interval: 1m
    ui:
      hide-url: true
      hide-hostname: true
    conditions:
      - "[STATUS] == 200"
