---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app terraria
spec:
  components:
    - ../../../components/volsync
  dependsOn:
    - name: infisical-operator
      namespace: security
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/games/terraria
  postBuild:
    substitute:
      APP: *app
      NS: games
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_PUID: "0"  # beardedio image runs as root
      VOLSYNC_PGID: "0"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: games
  wait: false
