---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo-runner
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    configMaps:
      config:
        suffix: config
        data:
          runner.yaml: |-
            cache:
              enabled: true
              dir: /data/cache
            container:
              docker_host: "-"
              workdir_parent: shared/workdir
            host:
              workdir_parent: /data/act
            kubernetes:
              namespace: development
              poll_timeout: 30m
            log:
              level: info
            plugins:
              k8s:
                address: unix:///plugin/forgejo-runner-k8s.sock
                options:
                  namespace: development
                  poll_timeout: 30m
                  labels: "app.kubernetes.io/name=forgejo-runner-instance,app.kubernetes.io/instance=forgejo-runner"
            runner:
              capacity: 5
              file: /persistent/.runner
              labels:
                - cluster:k8s:/config/podspec-default.yaml
                - ubuntu-latest:k8s:/config/podspec-default.yaml
                - ubuntu-24.04:k8s:/config/podspec-default.yaml
                - default:k8s:/config/podspec-default.yaml
                - docker:k8s:/config/podspec-default.yaml
              timeout: 3h
          podspec-default.yaml: |-
            serviceAccountName: forgejo-runner
            automountServiceAccountToken: true
            securityContext:
              fsGroup: 1000
              fsGroupChangePolicy: OnRootMismatch
            containers:
              - env:
                  - name: DEBIAN_FRONTEND
                    value: noninteractive
                  - name: BUILDKIT_HOST
                    value: tcp://buildkit.development.svc.cluster.local:1234
                image: ghcr.io/catthehacker/ubuntu:act-latest
                imagePullPolicy: IfNotPresent
                name: main
                resources:
                  limits:
                    memory: 12Gi
                  requests:
                    cpu: 100m
                    memory: 256Mi
                volumeMounts:
                  - name: buildkit-tls
                    mountPath: /etc/buildkit-tls
                    readOnly: true
            volumes:
              - name: buildkit-tls
                secret:
                  secretName: buildkit-client-tls
                  defaultMode: 0440
            restartPolicy: Never
    controllers:
      forgejo-runner:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          automountServiceAccountToken: true
          labels:
            app.kubernetes.io/component: forgejo-runner
          securityContext:
            fsGroup: 100
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 100
            runAsNonRoot: true
            runAsUser: 1000
        containers:
          runner:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner
              tag: 12.10.2@sha256:d5eeafda573012c229b730f5a18437b464d946473478e1f6bd56fd537b881609
            command:
              - sh
              - -ec
              - |
                exec /bin/forgejo-runner daemon \
                  --config /config/runner.yaml \
                  --url "http://forgejo-http:3000" \
                  --uuid "$(cat /etc/forgejo-runner-secret/uuid)" \
                  --token-url file:///etc/forgejo-runner-secret/token
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
          k8s-plugin:
            image:
              repository: git.erwanleboucher.dev/eleboucher/runner-k8s-plugin
              tag: 12.10.5@sha256:1f29ce6eb4f0579a01c25af2dd5442dffb1e86ca79dcbbfd62fa655a6d1418ee
            args:
              - --listen
              - unix:///plugin/forgejo-runner-k8s.sock
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    defaultPodOptions:
      priorityClassName: cluster-low
    persistence:
      config:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config
      plugin:
        type: emptyDir
        globalMounts:
          - path: /plugin
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /data
            subPath: data
          - path: /tmp
            subPath: tmp
      runner-secret:
        type: secret
        name: forgejo-runner-secret
        globalMounts:
          - path: /etc/forgejo-runner-secret
            readOnly: true
    rbac:
      bindings:
        forgejo-runner:
          type: RoleBinding
          roleRef:
            identifier: forgejo-runner
          subjects:
            - identifier: forgejo-runner
      roles:
        forgejo-runner:
          type: Role
          rules:
            - apiGroups:
                - ""
              resources:
                - pods
              verbs:
                - list
                - watch
                - create
                - get
                - delete
            - apiGroups:
                - ""
              resources:
                - pods/exec
              verbs:
                - create
                - get
            - apiGroups:
                - ""
              resources:
                - pods/log
              verbs:
                - list
                - watch
                - get
            - apiGroups:
                - batch
              resources:
                - jobs
              verbs:
                - list
                - watch
                - create
                - get
                - delete
    serviceAccount:
      forgejo-runner: {}
