---
# yaml-language-server: $schema=https://schemas.vzkn.eu/monitoring.coreos.com/prometheusrule_v1.json
# Abuse signals for the opt-in TURN relay (creds minted via scripts/turn-token.sh).
# Baseline for a small trusted circle is near-zero allocations; thresholds are
# deliberately conservative and tunable.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: stunner-rules
spec:
  groups:
    - name: stunner.rules
      rules:
        # Many simultaneous TURN allocations = more relaying clients than the
        # trusted circle should ever produce -> likely leaked credential.
        - alert: StunnerAllocationsHigh
          expr: stunner_allocations_active > 15
          for: 15m
          annotations:
            summary: >-
              STUNner has {{ $value }} active TURN allocations — possible relay abuse or a leaked credential
          labels:
            severity: warning
        # Sustained relay egress well above what a 1:1 voice/screenshare call needs.
        - alert: StunnerRelayTrafficHigh
          expr: sum(rate(stunner_listener_bytes_total{direction="tx"}[10m])) > 3e6
          for: 30m
          annotations:
            summary: >-
              STUNner relay egress sustained above 3 MB/s for 30m — verify legitimate call, not relay abuse
          labels:
            severity: warning
