---
# Path /kubernetes/development/forge/AUTHORIZED_KEYS: multi-line value,
# one ssh pubkey per line. Add/remove devices by editing the value.
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name forge-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/development/forge
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: development
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          authorized_keys: '{{ .AUTHORIZED_KEYS.Value }}'
