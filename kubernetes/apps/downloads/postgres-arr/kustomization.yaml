---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: downloads
patches:
  # Adds managed.roles to Cluster. Target name matches the literal pre-substitute
  # form (`postgres-${APP}`) since kustomize runs before Flux postBuild.
  - path: ./cluster-patch.yaml
    target:
      kind: Cluster
      name: postgres-\${APP}
resources:
  - ./cluster
  - ./clustergenerator.yaml
  - ./infisicalpushsecret.yaml
  - ./infisicalsecret.yaml
  - ./databases.yaml
