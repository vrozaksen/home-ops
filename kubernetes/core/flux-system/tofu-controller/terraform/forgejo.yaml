---
# yaml-language-server: $schema=https://schemas.vzkn.eu/infra.contrib.fluxcd.io/terraform_v1alpha2.json
apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: forgejo
spec:
  interval: 1h
  refreshBeforeApply: true
  approvePlan: auto
  backendConfig:
    customConfiguration: |
      backend "s3" {
        bucket   = "terraform-state"
        key      = "forgejo/forgejo.tfstate"
        region   = "eu-central-1"
        endpoints = {
          s3 = "https://api.s3.vzkn.eu"
        }
        skip_credentials_validation = true
        skip_requesting_account_id  = true
        skip_metadata_api_check     = true
        skip_region_validation      = true
        use_path_style              = true
        use_lockfile                = true
      }
  backendConfigsFrom:
    - kind: Secret
      name: terraform-backend-secret
  path: ./forgejo
  sourceRef:
    kind: OCIRepository
    name: terraform
  varsFrom:
    - kind: Secret
      name: terraform-secret
