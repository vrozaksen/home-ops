---
# yaml-language-server: $schema=https://schemas.vzkn.eu/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gotosocial
  annotations:
    gatus.home-operations.com/endpoint: |-
      group: social
spec:
  hostnames:
    - "gts.vzkn.eu"
  parentRefs:
    - name: envoy-external
      namespace: network
  rules:
    - backendRefs:
        - name: gotosocial
          port: 8080
      filters:
        - type: CORS
          cors:
            allowHeaders:
              - "*"
            allowMethods:
              - "*"
            allowOrigins:
              - "*"
            maxAge: 86400
---
# WebFinger + NodeInfo + host-meta on apex domain for Mastodon-style accounts (@user@vzkn.eu)
# yaml-language-server: $schema=https://schemas.vzkn.eu/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gotosocial-wellknown
  annotations:
    gatus.home-operations.com/enabled: "false"
  labels:
    external-dns/exclude: "true"
spec:
  hostnames:
    - "vzkn.eu"
  parentRefs:
    - name: envoy-external
      namespace: network
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/webfinger
        - path:
            type: PathPrefix
            value: /.well-known/nodeinfo
        - path:
            type: PathPrefix
            value: /.well-known/host-meta
        - path:
            type: PathPrefix
            value: /nodeinfo
      backendRefs:
        - name: gotosocial
          port: 8080
