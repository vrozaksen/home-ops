---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: heisenbridge
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      heisenbridge:
        type: deployment
        initContainers:
          generate-registration:
            image:
              repository: docker.io/hif1/heisenbridge
              tag: 1.15.4
            command:
              - "/bin/sh"
              - "-c"
            args:
              - |
                set -e
                if [ ! -f /data/registration.yaml ]; then
                  echo "Generating registration.yaml for Conduit/Continuwuity..."
                  heisenbridge --generate-compat \
                    --owner '@vrozaksen:vzkn.eu' \
                    -u 'http://heisenbridge.communication.svc.cluster.local:9898' \
                    /data/registration.yaml
                  echo "Done."
                else
                  echo "registration.yaml already exists, skipping."
                fi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
        containers:
          app:
            image:
              # renovate: datasource=docker depName=docker.io/hif1/heisenbridge
              repository: docker.io/hif1/heisenbridge
              tag: 1.15.4
            args:
              - "-c"
              - "/data/registration.yaml"
              - "-o"
              - "@vrozaksen:vzkn.eu"
              - "http://continuwuity.communication.svc.cluster.local:8080"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9898
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 9898
                  initialDelaySeconds: 2
                  periodSeconds: 5
                  timeoutSeconds: 3
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 192Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1337
        runAsGroup: 1337
        fsGroup: 1337
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

    service:
      app:
        controller: heisenbridge
        ports:
          http:
            port: 9898

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
            subPath: data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
