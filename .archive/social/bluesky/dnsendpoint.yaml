---
# yaml-language-server: $schema=https://schemas.vzkn.eu/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: bluesky
spec:
  endpoints:
    - dnsName: bluesky.vzkn.eu
      recordType: CNAME
      targets:
        - "tunnel.vzkn.eu"
    # Handle resolution for @vrozaksen.vzkn.eu (apex-style handle).
    # Points to the user's did:plc generated by cocoon during account creation.
    - dnsName: _atproto.vrozaksen.vzkn.eu
      recordType: TXT
      targets:
        - "did=did:plc:nqcrsmikzxly6y6l2twmjpxg"
