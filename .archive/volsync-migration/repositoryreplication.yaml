---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kopiur.home-operations.com/repositoryreplication_v1alpha1.json
# Blob-level mirror (kopia repository sync-to) of the volsync repo into the
# garage bucket - seeds the primary repo with full history, then keeps
# carrying snapshots volsync still writes during the per-app cutover.
# sync-to never deletes destination extras, so snapshots kopiur writes
# straight to garage are safe. Retire once all apps are migrated.
apiVersion: kopiur.home-operations.com/v1alpha1
kind: RepositoryReplication
metadata:
  name: volsync-to-garage
spec:
  sourceRef:
    kind: Repository
    name: volsync
  destination:
    s3:
      bucket: kopiur
      endpoint: api.s3.vzkn.eu
      region: eu-central-1
      auth:
        secretRef:
          name: kopiur-repository-secret
  schedule:
    cron: H * * * *  # hourly during the transition (webhook rejects H in step syntax like H/15); relax or retire after cutover
