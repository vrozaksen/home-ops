---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: forgejo
spec:
  discoveryFilters:
    - "vrozaksen/*"
  provider:
    name: forgejo
    endpoint: https://git.vzkn.eu
  image: ghcr.io/renovatebot/renovate:43.211.0@sha256:fa4a674597a1ed17ba15d7654484ed7554d4a8d37d631f0a22a5e6125a38a4d9
  schedule: "0 * * * *"
  parallelism: 3
  secretRef: renovate-forgejo-token
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
    - name: RENOVATE_AUTODISCOVER
      value: "true"
    - name: RENOVATE_AUTODISCOVER_FILTER
      value: "vrozaksen/*"
    - name: RENOVATE_GIT_AUTHOR
      value: "Renovate Bot <renovate@vzkn.eu>"
    - name: RENOVATE_USERNAME
      value: "renovate-bot"
    # Needed to resolve `github>` preset extends + bump datasource rate limits
    # when scanning Forgejo repos. renovate-token secret is refreshed every 30m
    # by the token-refresh CronJob.
    - name: GITHUB_COM_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-token
          key: GITHUB_COM_TOKEN
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  webhook:
    enabled: true
    authentication:
      enabled: false
