---
# yaml-language-server: $schema=https://schemas.vzkn.eu/tekton.dev/task_v1.json
# Minimal git clone. When ServiceAccount has a secret with tekton.dev/git-0
# annotation, Tekton injects git credentials automatically — no explicit
# basic-auth workspace needed here.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
spec:
  description: Clone a git repository into the output workspace.
  params:
    - name: url
      description: Git repository URL (e.g. https://forgejo.vzkn.eu/vrozaksen/nix-config)
    - name: revision
      description: Commit, branch, or tag
      default: main
    - name: depth
      description: Clone depth (0 = full history)
      default: "1"
  workspaces:
    - name: output
      description: Repo gets checked out here
  results:
    - name: commit
      description: Commit SHA that got checked out
  steps:
    - name: clone
      image: alpine/git:2.52.0
      workingDir: $(workspaces.output.path)
      script: |-
        #!/bin/sh
        set -eu
        # Workspace volume may be owned by a different UID than the runtime user;
        # git refuses to operate on dubiously-owned dirs since CVE-2022-24765.
        git config --global --add safe.directory "$(workspaces.output.path)"
        git init -q .
        git remote add origin "$(params.url)"
        if [ "$(params.depth)" != "0" ]; then
          DEPTH="--depth=$(params.depth)"
        else
          DEPTH=""
        fi
        git fetch $DEPTH origin "$(params.revision)"
        git checkout FETCH_HEAD
        git rev-parse HEAD | tr -d '\n' > $(results.commit.path)
