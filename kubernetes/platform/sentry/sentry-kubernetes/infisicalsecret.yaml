---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name sentry-kubernetes-dsn
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        # Path populated by terraform/sentry (F2.2). DSN key materializes
        # AFTER terraform Kustomization reconciles successfully. Before that:
        # sentry-kubernetes pod crashloops with "missing SENTRY_DSN".
        secretsPath: /sentry/projects/sentry-internal
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: sentry
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          # Chart template references `sentry.dsn` key (per
          # templates/_helpers.tpl + templates/deployment.yaml)
          sentry.dsn: '{{ .DSN.Value }}'
