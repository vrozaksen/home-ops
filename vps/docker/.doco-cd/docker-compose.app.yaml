# This file is not managed by doco-cd because it can't manage itself.
# Ansible copies it to /opt/doco-cd/ and manages the lifecycle.
# To update doco-cd image: bump version here, run `just doco-cd`.
---
secrets:
  gh_token:
    file: /opt/doco-cd/secrets/gh_token
services:
  doco-cd:
    container_name: doco-cd
    image: ghcr.io/kimdre/doco-cd:0.76.0@sha256:ef0df49fca5ccaa4c4e01e13bf99d15609c093dd08f53f0c94dacac2a72ed4bd
    restart: unless-stopped
    environment:
      GIT_ACCESS_TOKEN_FILE: /run/secrets/gh_token
      LOG_LEVEL: info
      DEPLOY_CONFIG_BASE_DIR: ./vps/docker/
      POLL_CONFIG: |-
        - url: https://github.com/vrozaksen/home-ops.git
          reference: refs/heads/main
          interval: 60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data
      - /opt/pangolin/.env:/opt/pangolin/.env:ro
    secrets:
      - gh_token
    healthcheck:
      test:
        - "CMD"
        - "/doco-cd"
        - "healthcheck"
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  data: {}
