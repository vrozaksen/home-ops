---
directories:
  downloads: /soulseek/complete
  incomplete: /soulseek/incomplete
flags:
  no_version_check: true
integrations:
  vpn:
    enabled: true
    port_forwarding: true
    polling_interval: 2500
    gluetun:
      url: http://localhost:8000
      timeout: 1000
metrics:
  enabled: true
  url: /metrics
  authentication:
    disabled: true
remote_configuration: false
shares:
  directories:
    - /soulseek/shared
  filters:
    - \.ini$
    - Thumbs.db$
    - \.DS_Store$
transfers:
  download:
    destination:
      permissions:
        mode: 777  # moved from permissions.file.mode in slskd 0.26.0; 777 so Lidarr manages completed files
    retry:
      incomplete: overwrite  # restart from scratch; resuming across different Soulseek sources yields corrupt files Lidarr skips
      attempts: 3
      delay: 5000       # ms, first retry
      max_delay: 60000  # ms, backoff ceiling
web:
  authentication:
    api_keys:
      my_api_key:
        key: ${SLSKD_API_KEY}
        cidr: 0.0.0.0/0,::/0
