---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres-arr
spec:
  components:
    - ../../../components/cnpg/initdb
  dependsOn:
    - name: infisical-operator
      namespace: security
    - name: plugin-barman-cloud
      namespace: database
  healthCheckExprs:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
  interval: 1h
  path: ./kubernetes/apps/downloads/postgres-arr
  postBuild:
    substitute:
      # APP=arr so the cluster is `postgres-arr`, default user `arr`, default db `arr`,
      # app secret `postgres-arr-app`. Extra per-app DBs declared via Database CRs.
      APP: arr
      NS: &ns downloads
      CNPG_SIZE: 5Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: false
