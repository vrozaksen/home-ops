---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redbot
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      redbot:
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            k8tz.io/timezone: "Europe/Warsaw"
        containers:
          app:
            image:
              repository: ghcr.io/vrozaksen/red-discordbot
              tag: 3.5.24@sha256:fb879bddee8822e5fd8a96c24268cf204fc09fe560215522217acf4a68e2fcbe
            env:
              PREFIX: "."
              PREFIX2: "/"
              PREFIX3: "!"
              PREFIX4: ","
              PUID: &uid 1000
              PGID: &gid 100
            envFrom:
              - secretRef:
                  name: redbot-secret
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: *uid
        runAsGroup: *gid
        fsGroup: *gid
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          redbot:
            app:
              - path: /data
