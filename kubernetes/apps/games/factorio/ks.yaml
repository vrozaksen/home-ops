---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app factorio
spec:
  components:
    - ../../../components/kopiur
  dependsOn:
    - name: infisical-operator
      namespace: security
    - name: kopiur
      namespace: kopiur-system
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/apps/games/factorio
  postBuild:
    substitute:
      APP: *app
      NS: games
      KOPIUR_CAPACITY: 20Gi
      KOPIUR_PUID: "1000"
      KOPIUR_PGID: "1000"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: games
  wait: false
