---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app attic
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      # HTTP API — horizontally scaled for parallel nix push/pull from CI matrices
      attic:
        replicas: 2
        strategy: RollingUpdate
        initContainers:
          # db-migrations runs only on Monolithic/DbMigrations modes — explicit
          # init step so api-server/garbage-collector modes have schema ready.
          # Idempotent — safe to run on every pod startup.
          migrate: &migrate
            image: &image
              repository: ghcr.io/zhaofengli/attic
              tag: cf7294607583a8d9f06026007da1ced564d43c86@sha256:4781271f8bedc37bdf6c082c468348f277f95e1f368473f7f9f88776142c9660
            command:
              - atticd
              - --config
              - /etc/atticd/server.toml
              - --mode
              - db-migrations
            env: &env
              ATTIC_SERVER_DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: postgres-attic-app
                    key: uri
            envFrom: &envFrom
              - secretRef:
                  name: attic-secret
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        containers:
          app:
            image: *image
            command:
              - atticd
              - --config
              - /etc/atticd/server.toml
              - --mode
              - api-server
            env: *env
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness: *probes
            securityContext: *securityContext
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
      # GC — single instance, runs sweep every 12h. No HTTP port, no probes.
      gc:
        replicas: 1
        initContainers:
          migrate: *migrate
        containers:
          app:
            image: *image
            command:
              - atticd
              - --config
              - /etc/atticd/server.toml
              - --mode
              - garbage-collector
            env: *env
            envFrom: *envFrom
            securityContext: *securityContext
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: attic
        ports:
          http:
            port: 8080
    route:
      app:
        annotations:
          gatus.home-operations.com/endpoint: |-
            group: development
        hostnames:
          - cache.vzkn.eu
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      config:
        type: configMap
        name: attic-config
        globalMounts:
          - path: /etc/atticd/server.toml
            subPath: server.toml
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
