---
# yaml-language-server: $schema=https://schemas.vzkn.eu/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: altinity-clickhouse-operator
spec:
  interval: 1h
  url: https://docs.altinity.com/clickhouse-operator
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: altinity-clickhouse-operator
spec:
  interval: 1h
  chart:
    spec:
      # renovate: registryUrl=https://docs.altinity.com/clickhouse-operator
      chart: altinity-clickhouse-operator
      version: 0.27.2
      sourceRef:
        kind: HelmRepository
        name: altinity-clickhouse-operator
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    configs:
      files:
        config.yaml:
          watch:
            namespaces:
              include:
                - ".*"
    operator:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
    metrics:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 128Mi
    nodeSelector:
      kubernetes.io/arch: amd64
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
    serviceMonitor:
      enabled: true
