---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  # Explicit allowlist: only repos still primary on GitHub.
  # Forgejo-migrated repos (renovate-config, vrozaksen, vzkn-eu, nix-config, ...)
  # are scanned by the forgejo RenovateJob — having both jobs scan the same
  # content (via push-mirror) causes force-push lease conflicts.
  discoveryFilters:
    - "vrozaksen/home-ops"
  provider:
    name: github
  image: ghcr.io/renovatebot/renovate:43.268.2@sha256:7dba945c22a09ef0080eb79ef2ba78b3889e788e07d28c012e58d48cfd58f437
  schedule: "0 * * * *"
  parallelism: 3
  # Operator mints + refreshes RENOVATE_TOKEN from the GitHub App natively (beta).
  githubAppReference:
    secretName: repo-killer-app-secret
    appIdSecretKey: GITHUB_APP_ID
    installationIdSecretKey: INSTALL_ID
    pemSecretKey: private-key.pem
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  webhook:
    enabled: true
    authentication:
      enabled: false
