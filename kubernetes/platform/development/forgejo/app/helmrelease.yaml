---
# yaml-language-server: $schema=https://schemas.vzkn.eu/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: forgejo
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 17.1.2
  url: oci://code.forgejo.org/forgejo-helm/forgejo
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: forgejo
  values:
    global:
      priorityClassName: cluster-low
    replicaCount: 1
    strategy:
      type: Recreate
    image:
      registry: code.forgejo.org
      repository: forgejo/forgejo
      tag: 16.0.1-rootless
      rootless: true

    podSecurityContext:
      fsGroup: 100

    containerSecurityContext:
      runAsUser: 1000
      runAsGroup: 100
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        add:
          - SYS_CHROOT

    service:
      annotations:
        prometheus.io/probe: "true"
        prometheus.io/protocol: tcp
      http:
        port: 3000
      ssh:
        port: &sshPort 22

    resources:
      requests:
        cpu: 50m
        memory: 2Gi
      limits:
        memory: 4Gi

    persistence:
      enabled: true
      mount: true
      create: false
      claimName: forgejo

    gitea:
      admin:
        existingSecret: forgejo-admin-secret
        email: vrozaksen@protonmail.com
        passwordMode: keepUpdated
      config:
        APP_NAME: "Forgejo: Beyond coding. We forge."
        server:
          APP_DATA_PATH: /data/gitea
          DOMAIN: git.vzkn.eu
          ROOT_URL: https://git.vzkn.eu
          DISABLE_SSH: false
          SSH_DOMAIN: ssh.git.vzkn.eu
          SSH_PORT: *sshPort
          SSH_LISTEN_PORT: *sshPort
          SSH_SERVER_HOST_KEYS: ssh/ssh_host_ed25519_key
          ENABLE_GZIP: true
          LFS_START_SERVER: true
          LANDING_PAGE: explore
        database:
          DB_TYPE: postgres
          SSL_MODE: disable
          LOG_SQL: false
          SLOW_QUERY_THRESHOLD: 5s
        indexer:
          ISSUE_INDEXER_TYPE: bleve
          REPO_INDEXER_ENABLED: true
          REPO_INDEXER_REPO_TYPES: sources,forks,mirrors,templates
        queue:
          TYPE: redis
          CONN_STR: redis://forgejo-dragonfly:6379?pool_size=100&idle_timeout=180s
        cache:
          ENABLED: true
          ADAPTER: redis
          HOST: redis://forgejo-dragonfly:6379?pool_size=100&idle_timeout=180s
        session:
          PROVIDER: redis
          PROVIDER_CONFIG: redis://forgejo-dragonfly:6379?pool_size=100&idle_timeout=180s
          COOKIE_SECURE: true
          DOMAIN: git.vzkn.eu
          COOKIE_NAME: forgejo_session
          SESSION_LIFE_TIME: "1209600"
          SAME_SITE: lax
        repository:
          DEFAULT_BRANCH: main
          DEFAULT_REPO_UNITS: repo.code,repo.releases,repo.issues,repo.pulls,repo.actions
          DISABLED_REPO_UNITS: repo.ext_wiki,repo.ext_issues
          ROOT: /data/git/gitea-repositories
          ENABLE_PUSH_CREATE_USER: true
          DEFAULT_PRIVATE: last
        repository.pull-request:
          DEFAULT_MERGE_STYLE: squash
        repository.signing:
          FORMAT: ssh
          SIGNING_KEY: /data/signing/ed25519.pub
          SIGNING_NAME: git.vzkn.eu
          SIGNING_EMAIL: noreply@git.vzkn.eu
          INITIAL_COMMIT: pubkey
          CRUD_ACTIONS: pubkey, parentsigned
          WIKI: never
          MERGES: pubkey
        lfs:
          PATH: /data/git/lfs
        security:
          PASSWORD_HASH_ALGO: argon2
          PASSWORD_COMPLEXITY: lower,upper,digit,spec
          PASSWORD_CHECK_PWN: true
          MIN_PASSWORD_LENGTH: 12
          REVERSE_PROXY_LIMIT: 1
          REVERSE_PROXY_TRUSTED_PROXIES: 10.42.0.0/16
        openid:
          USERNAME: preferred_username
          UPDATE_AVATAR: true
          ENABLE_OPENID_SIGNIN: false
          ENABLE_OPENID_SIGNUP: false
        oauth2_client:
          ACCOUNT_LINKING: auto
          USERNAME: preferred_username
          UPDATE_AVATAR: true
          ENABLE_AUTO_REGISTRATION: true
        service:
          DISABLE_REGISTRATION: true
          ALLOW_ONLY_EXTERNAL_REGISTRATION: true
          ENABLE_INTERNAL_SIGNIN: false
          ENABLE_PASSWORD_SIGNIN_FORM: false
          REGISTER_EMAIL_CONFIRM: true
          ENABLE_NOTIFY_MAIL: true
          ENABLE_CAPTCHA: false
          DEFAULT_KEEP_EMAIL_PRIVATE: true
          DEFAULT_ALLOW_CREATE_ORGANIZATION: true
          DEFAULT_ENABLE_TIMETRACKING: true
          ENABLE_USER_HEATMAP: true
          AUTO_WATCH_NEW_REPOS: true
          SHOW_REGISTRATION_BUTTON: false
          VALID_SITE_URL_SCHEMES: https
        service.explore:
          DISABLE_CODE_PAGE: false
          DISABLE_ORGANIZATIONS_PAGE: true
          DISABLE_USERS_PAGE: true
          REQUIRE_SIGNIN_VIEW: false
        mailer:
          ENABLED: true
          PROTOCOL: smtp
          SMTP_ADDR: smtp-relay.network.svc.cluster.local
          SMTP_PORT: 25
          FROM: noreply@vzkn.eu
        storage:
          STORAGE_TYPE: minio
          MINIO_ENDPOINT: api.s3.vzkn.eu
          MINIO_BUCKET: forgejo
          MINIO_LOCATION: eu-central-1
          MINIO_USE_SSL: true
        cron:
          ENABLED: true
        cron.archive_cleanup:
          ENABLED: true
          RUN_AT_START: true
          SCHEDULE: "@every 1h"
          OLDER_THAN: 2h
        cron.git_gc_repos:
          ENABLED: true
          SCHEDULE: "@every 168h"
          TIMEOUT: 60s
          ARGS: "--aggressive --auto"
        cron.update_mirrors:
          SCHEDULE: "@every 10m"
          PULL_LIMIT: 50
          PUSH_LIMIT: 50
        cron.cleanup_actions:
          ENABLED: true
          SCHEDULE: "@midnight"
        metrics:
          ENABLED: true
          serviceMonitor:
            enabled: true
            namespace: monitoring
            additionalLabels:
              release: kube-prometheus-stack
        time:
          DEFAULT_UI_LOCATION: Europe/Warsaw
        federation:
          ENABLED: true
          SHARE_USER_STATISTICS: true
        ui:
          DEFAULT_THEME: forgejo-auto
          SHOW_USER_EMAIL: false
          AMBIGUOUS_UNICODE_DETECTION: true
          DEFAULT_SHOW_FULL_NAME: true
          FEED_MAX_COMMIT_NUM: 10
          GRAPH_MAX_COMMIT_NUM: 100
        markdown:
          ENABLE_HARD_LINE_BREAK_IN_COMMENTS: true
          ENABLE_MATH: true
        webhook:
          ALLOWED_HOST_LIST: "*"
          SKIP_TLS_VERIFY: false
          DELIVER_TIMEOUT: 10
        migrations:
          ALLOW_LOCALNETWORKS: true
          ALLOWED_DOMAINS: "*"
        api:
          ENABLE_SWAGGER: true
          MAX_RESPONSE_ITEMS: 50
          DEFAULT_PAGING_NUM: 30
        git:
          DISABLE_DIFF_HIGHLIGHT: false
          MAX_GIT_DIFF_LINES: 1000
          MAX_GIT_DIFF_FILES: 100
          ENABLE_AUTO_GIT_WIRE_PROTOCOL: true
          PULL_REQUEST_PUSH_MESSAGE: true
          VERBOSE_PUSH: true
        actions:
          ENABLED: true
          DEFAULT_ACTIONS_URL: https://github.com
          ARTIFACT_RETENTION_DAYS: 90
          LOG_RETENTION_DAYS: 365
          LOG_COMPRESSION: zstd
        qos:
          ENABLED: true
      oauth:
        # Source name MUST be `kanidm` — the callback path embeds it:
        # https://git.vzkn.eu/user/oauth2/kanidm/callback (matches Kanidm redirect URL).
        - name: kanidm
          provider: openidConnect
          # kanidm-provision sidecar writes this secret with chart-required keys key/secret.
          existingSecret: kanidm-forgejo-oidc
          autoDiscoverUrl: "https://idm.vzkn.eu/oauth2/openid/forgejo/.well-known/openid-configuration"
          scopes: "openid email profile groups"
          iconUrl: "https://idm.vzkn.eu/pkg/img/logo-square.svg"
      additionalConfigFromEnvs:
        - name: GITEA__DATABASE__HOST
          value: pooler-forgejo-rw
        - name: GITEA__DATABASE__NAME
          valueFrom:
            secretKeyRef:
              name: postgres-forgejo-app
              key: dbname
        - name: GITEA__DATABASE__USER
          valueFrom:
            secretKeyRef:
              name: postgres-forgejo-app
              key: username
        - name: GITEA__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: postgres-forgejo-app
              key: password
        - name: GITEA__SECURITY__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: forgejo-secret
              key: SECRET_KEY
        - name: GITEA__STORAGE__MINIO_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: forgejo-secret
              key: MINIO_ACCESS_KEY_ID
        - name: GITEA__STORAGE__MINIO_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: forgejo-secret
              key: MINIO_SECRET_ACCESS_KEY
      podAnnotations:
        reloader.stakater.com/search: "true"

    extraContainerVolumeMounts:
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
    extraInitVolumeMounts:
      - name: signing-key
        mountPath: /data/signing
        readOnly: true
    extraVolumes:
      - name: signing-key
        secret:
          secretName: forgejo-signing-key
          defaultMode: 0400

    httpRoute:
      enabled: false
    tcpRoute:
      enabled: false
    ingress:
      enabled: false
    valkey-cluster:
      enabled: false
    postgresql-ha:
      enabled: false
    postgresql:
      enabled: false
    redis-cluster:
      enabled: false

    checkDeprecation: true
    test:
      enabled: false
