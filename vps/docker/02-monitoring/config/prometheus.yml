global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    instance: pangolin-vps
    location: ovh

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
    relabel_configs:
      - target_label: instance
        replacement: pangolin-vps

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - target_label: job
        replacement: node-exporter
      - target_label: instance
        replacement: pangolin-vps
      - target_label: nodename
        replacement: vps

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    relabel_configs:
      - target_label: instance
        replacement: pangolin-vps

  - job_name: traefik
    static_configs:
      - targets: ["gerbil:8082"]
    relabel_configs:
      - target_label: instance
        replacement: pangolin-vps

  - job_name: crowdsec
    static_configs:
      - targets: ["crowdsec:6060"]
    relabel_configs:
      - target_label: instance
        replacement: pangolin-vps
