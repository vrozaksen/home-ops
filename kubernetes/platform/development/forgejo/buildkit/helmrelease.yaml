---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app buildkit
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      buildkit:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          labels:
            app.kubernetes.io/name: *app
          annotations:
            container.apparmor.security.beta.kubernetes.io/app: unconfined
            container.apparmor.security.beta.kubernetes.io/binfmt: unconfined
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: Unconfined
        initContainers:
          auth:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df
            command:
              - sh
              - -ec
              - |
                AUTH=$(printf '%s:%s' "$HARBOR_ROBOT_NAME" "$HARBOR_ROBOT_TOKEN" | base64 -w0)
                printf '{"auths":{"registry.vzkn.eu":{"auth":"%s"}}}\n' "$AUTH" \
                  > /home/user/.docker/config.json
                chmod 0600 /home/user/.docker/config.json
            envFrom:
              - secretRef:
                  name: buildkit-secret
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true
          binfmt:
            image:
              repository: tonistiigi/binfmt
              tag: qemu-v10.2.1@sha256:d3b963f787999e6c0219a48dba02978769286ff61a5f4d26245cb6a6e5567ea3
            args:
              - "--install"
              - "all"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: true
        containers:
          app:
            image:
              # renovate: datasource=docker depName=moby/buildkit
              repository: moby/buildkit
              tag: v0.31.2-rootless@sha256:0eeb84626c0cd01aecae7848c5ed8f095aec279dd936d0cdb5a64110f42ca65b
            args:
              - --addr=tcp://0.0.0.0:1234
              - --addr=unix:///run/user/1000/buildkit/buildkitd.sock
              - --oci-worker-no-process-sandbox
              # native snapshotter — Talos doesn't expose /dev/fuse to pods,
              # so overlayfs/fuse-overlayfs aren't options.
              - --oci-worker-snapshotter=native
              # mTLS — server cert (DNS SANs cover buildkit Service) +
              # cluster-local CA. `--tlscacert` enforces client cert auth
              # automatically (any non-empty CA = mTLS required).
              - --tlscert=/certs/tls.crt
              - --tlskey=/certs/tls.key
              - --tlscacert=/certs/ca.crt
            ports:
              - name: grpc
                containerPort: 1234
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 1234
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - buildctl
                      - --addr=unix:///run/user/1000/buildkit/buildkitd.sock
                      - debug
                      - workers
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 12Gi
            securityContext:
              allowPrivilegeEscalation: true
              capabilities:
                drop:
                  - "ALL"
                add:
                  - "SETUID"
                  - "SETGID"
      prune:
        type: cronjob
        cronjob:
          schedule: "0 3 * * *"  # daily 03:00
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 2
          backoffLimit: 1
        pod:
          labels:
            app.kubernetes.io/name: buildkit-prune
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: moby/buildkit
              tag: v0.31.2-rootless@sha256:0eeb84626c0cd01aecae7848c5ed8f095aec279dd936d0cdb5a64110f42ca65b
            command:
              - buildctl
              - --addr=tcp://buildkit.development.svc.cluster.local:1234
              - --tlscacert=/certs/ca.crt
              - --tlscert=/certs/tls.crt
              - --tlskey=/certs/tls.key
              - prune
              - --keep-storage=20480  # retain 20 GiB
              - --keep-duration=168h  # retain ≤7 days regardless
            resources:
              requests: {cpu: 10m, memory: 32Mi}
              limits: {memory: 128Mi}
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
    defaultPodOptions:
      priorityClassName: cluster-low
    persistence:
      cache:
        type: persistentVolumeClaim
        storageClass: ceph-block
        accessMode: ReadWriteOnce
        size: 100Gi
        advancedMounts:
          buildkit:
            app:
              - path: /home/user/.local/share/buildkit
      docker-config:
        type: emptyDir
        advancedMounts:
          buildkit:
            app:
              - path: /home/user/.docker
            auth:
              - path: /home/user/.docker
      run:
        type: emptyDir
        advancedMounts:
          buildkit:
            app:
              - path: /run/user/1000
            auth:
              - path: /run/user/1000
      tls:
        type: secret
        name: buildkit-server-tls
        defaultMode: 0400
        advancedMounts:
          buildkit:
            app:
              - path: /certs/tls.crt
                subPath: tls.crt
                readOnly: true
              - path: /certs/tls.key
                subPath: tls.key
                readOnly: true
              - path: /certs/ca.crt
                subPath: ca.crt
                readOnly: true
      tls-client:
        type: secret
        name: buildkit-client-tls
        defaultMode: 0440
        advancedMounts:
          prune:
            app:
              - path: /certs/tls.crt
                subPath: tls.crt
                readOnly: true
              - path: /certs/tls.key
                subPath: tls.key
                readOnly: true
              - path: /certs/ca.crt
                subPath: ca.crt
                readOnly: true
    service:
      app:
        controller: buildkit
        ports:
          grpc:
            port: 1234
            targetPort: grpc
            protocol: TCP
