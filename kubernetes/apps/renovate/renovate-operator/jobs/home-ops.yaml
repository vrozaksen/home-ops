---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  discoveryFilters:
    - "vrozaksen/*"
  provider:
    name: github
  image: ghcr.io/renovatebot/renovate:43.176.1@sha256:4f29f0339f1fc0578c45e2e08deb83c0d65da79ceb8f1707585da9377e90aaa0
  schedule: "0 * * * *"
  parallelism: 3
  secretRef: renovate-token
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: "true"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  webhook:
    enabled: true
    authentication:
      enabled: false
