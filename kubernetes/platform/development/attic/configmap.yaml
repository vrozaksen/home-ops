---
apiVersion: v1
kind: ConfigMap
metadata:
  name: attic-config
data:
  server.toml: |-
    listen = "[::]:8080"
    api-endpoint = "https://cache.vzkn.eu/"
    allowed-hosts = ["cache.vzkn.eu"]
    require-proof-of-possession = true
    soft-delete-caches = true

    [database]
    # url via ATTIC_SERVER_DATABASE_URL env (sqlite, heartbeat irrelevant)

    [storage]
    type = "s3"
    region = "eu-central-1"
    bucket = "attic"
    endpoint = "https://api.s3.vzkn.eu"

    # Upstream defaults — best dedup ratio across NARs with shared deps.
    # WARNING: changing these later breaks dedup for existing chunks.
    [chunking]
    nar-size-threshold = 65536
    min-size = 16384
    avg-size = 65536
    max-size = 262144

    [compression]
    type = "zstd"

    [garbage-collection]
    interval = "12 hours"
    # reference-only GC (no time-based eviction)
    default-retention-period = "0s"

    # [jwt.signing] populated at runtime from ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64 env
    [jwt]
