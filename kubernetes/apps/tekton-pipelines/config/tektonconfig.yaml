---
# yaml-language-server: $schema=https://schemas.vzkn.eu/operator.tekton.dev/tektonconfig_v1alpha1.json
# TektonConfig drives the whole stack via profile=all:
# https://tekton.dev/docs/operator/tektonconfig/
#   - installs TektonPipeline, TektonTrigger, TektonChain, TektonDashboard
#   - skips TektonResult (managed separately — custom CNPG + S3 backend)
#   - TektonAddon/SCCConfig omitted (OpenShift-only)
apiVersion: operator.tekton.dev/v1alpha1
kind: TektonConfig
metadata:
  name: config
spec:
  profile: all
  targetNamespace: tekton-pipelines

  pipeline:
    # Feature flags — https://tekton.dev/docs/operator/tektonpipeline/
    enable-api-fields: stable
    enable-bundles-resolver: true
    enable-cluster-resolver: true
    enable-git-resolver: true
    enable-hub-resolver: true
    enable-step-actions: true
    enable-provenance-in-status: true

    # Defaults
    default-timeout-minutes: 180
    default-service-account: default
    default-task-run-workspace-binding: |
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: ceph-block
          resources:
            requests:
              storage: 1Gi
    default-pod-template: |
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

    # Security
    require-git-ssh-secret-known-hosts: true
    set-security-context: true
    disable-creds-init: false

    # HA + performance across 3-node cluster
    performance:
      disable-ha: false
      replicas: 3
      buckets: 10
      threads-per-controller: 4
      kube-api-qps: 10.0
      kube-api-burst: 20

    # Prometheus metrics
    metrics.pipelinerun.duration-type: histogram
    metrics.pipelinerun.level: pipeline
    metrics.taskrun.duration-type: histogram
    metrics.taskrun.level: task
    metrics.count.enable-reason: true

  trigger:
    disabled: false

  dashboard:
    readonly: false

  chain:
    disabled: false
    # Local x509 signing — Chain auto-generates signing key in
    # `tekton-chains/signing-secrets` secret on first reconcile.
    # OCI artifact signing (Kaniko/Buildah tasks produce IMAGE_URL/IMAGE_DIGEST)
    artifacts.oci.signer: x509
    artifacts.oci.storage: oci
    artifacts.oci.format: simplesigning
    # SLSA v1 provenance attestations stored in Tekton Results
    artifacts.taskrun.signer: x509
    artifacts.taskrun.storage: tekton
    artifacts.taskrun.format: slsa/v2alpha3
    artifacts.pipelinerun.signer: x509
    artifacts.pipelinerun.storage: tekton
    artifacts.pipelinerun.format: slsa/v2alpha3
    # Keyless signing (Sigstore Fulcio/Rekor) omitted — requires OIDC-enabled
    # SA tokens with specific audience. Allowed providers:
    # "", google, spiffe, github, filesystem (NOT "kubernetes"). Enable later
    # when OIDC projected tokens + Fulcio trust setup is ready.

  # TektonResult managed via standalone CR (custom CNPG + S3). Disable auto-install.
  result:
    disabled: true

  # Hub: no `disabled` field in schema. TektonHub is opt-in — CR never created,
  # so no need to disable. `hub` field in TektonConfig is only for params/options
  # passed to an existing TektonHub.

  # Job-based pruner (cron). Event-based tektonpruner cannot coexist — pick one.
  # Job-based is simpler and battle-tested.
  pruner:
    disabled: false
    schedule: "0 3 * * *"
    keep: 50
    resources:
      - taskrun
      - pipelinerun
