---
# yaml-language-server: $schema=https://schemas.vzkn.eu/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: sentry-kubernetes
spec:
  interval: 1h
  url: https://sentry-kubernetes.github.io/charts
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sentry-kubernetes
spec:
  interval: 1h
  chart:
    spec:
      # renovate: registryUrl=https://sentry-kubernetes.github.io/charts
      chart: sentry-kubernetes
      version: 0.4.0
      sourceRef:
        kind: HelmRepository
        name: sentry-kubernetes
  values:
    # DSN comes from sentry-kubernetes-dsn Secret (managed by InfisicalSecret),
    # key `sentry.dsn`. Initially empty/missing until terraform/sentry creates
    # project + pushes DSN to /sentry/projects/sentry-internal/dsn — pod will
    # crashloop until then. Reloader auto-restarts once secret materializes.
    #
    # `sentry.dsn` value below is a placeholder — chart template gates the
    # SENTRY_DSN env block on truthy `.Values.sentry.dsn`. existingSecret
    # determines which Secret env actually pulls from.
    existingSecret: sentry-kubernetes-dsn
    sentry:
      dsn: "from-existing-secret"
      environment: production
      watchNamespaces: "__all__"
      # Catch historical events (last 24h) on restart, not just new ones.
      watchHistorical: "1"
      # Track every CronJob run as a Sentry Cron Monitor — auto-creates
      # check-ins per scheduled job (CNPG ScheduledBackup, Volsync
      # ReplicationSource, Trivy compliance scan, sentry-cleanup). Surfaces
      # missed/failed runs that today are silent unless restore actually
      # fails. RBAC for cronjobs.batch already granted in custom_rules.
      monitorCronjobs: "1"
    image:
      repository: ghcr.io/getsentry/sentry-kubernetes
      tag: latest
      pullPolicy: Always
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
    podAnnotations:
      reloader.stakater.com/auto: "true"
    priorityClassName: cluster-low
    serviceAccount:
      create: true
    rbac:
      create: true
      custom_rules:
        - verbs:
            - get
            - list
            - watch
          apiGroups:
            - ""
          resources:
            - events
            - pods
        - verbs:
            - get
            - list
            - watch
          apiGroups:
            - apps
          resources:
            - deployments
            - replicasets
        - verbs:
            - get
            - list
            - watch
          apiGroups:
            - batch
          resources:
            - jobs
            - cronjobs
