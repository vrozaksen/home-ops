---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./clustergenerator.yaml
  - ./infisicalpushsecret.yaml
  - ./infisicalsecret.yaml
  - ./databases.yaml
patches:
  # Adds spec.managed.roles to the Cluster CR generated by components/cnpg/initdb.
  # Local kustomize patch (not Flux spec.patches — that would be overridden by
  # the global child-defaults patch). Targets Cluster name `postgres-arr`.
  - path: ./cluster-patch.yaml
    target:
      kind: Cluster
      name: postgres-arr
