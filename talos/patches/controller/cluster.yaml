---
cluster:
  allowSchedulingOnControlPlanes: false
  apiServer:
    extraArgs:
      enable-aggregator-routing: true
      feature-gates: PersistentVolumeClaimUnusedSinceTime=true,HPAScaleToZero=true
      # Faster pod eviction from unreachable nodes (default: 300s)
      default-not-ready-toleration-seconds: "60"
      default-unreachable-toleration-seconds: "60"
      # OIDC authentication for Headlamp
      oidc-issuer-url: https://sso.vzkn.eu/application/o/headlamp/
      oidc-client-id: headlamp
      oidc-username-claim: preferred_username
      oidc-groups-claim: groups
  controllerManager:
    extraArgs:
      bind-address: 0.0.0.0
      feature-gates: PersistentVolumeClaimUnusedSinceTime=true,HPAScaleToZero=true
  coreDNS:
    disabled: true
  etcd:
    advertisedSubnets:
      - "10.10.0.0/24"
    extraArgs:
      auto-compaction-mode: periodic
      auto-compaction-retention: "5m"
      listen-metrics-urls: http://0.0.0.0:2381
      quota-backend-bytes: 4294967296  # 4 GiB
  proxy:
    disabled: true
  scheduler:
    extraArgs:
      bind-address: 0.0.0.0
    config:
      apiVersion: kubescheduler.config.k8s.io/v1
      kind: KubeSchedulerConfiguration
      profiles:
        - schedulerName: default-scheduler
          plugins:
            score:
              disabled:
                - name: ImageLocality
          pluginConfig:
            - name: PodTopologySpread
              args:
                defaultingType: List
                defaultConstraints:
                  - maxSkew: 1
                    topologyKey: kubernetes.io/hostname
                    whenUnsatisfiable: ScheduleAnyway
