---
# yaml-language-server: $schema=https://schemas.vzkn.eu/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ceph-node-nfsmount-diskspace-warning
spec:
  matchers:
    - name: alertname
      value: CephNodeDiskspaceWarning
    - name: mountpoint
      value: (/etc/nfsmount.conf|/var)
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: ceph-node-local-diskspace-warning
spec:
  matchers:
    - name: alertname
      value: CephNodeDiskspaceWarning
    - name: device
      value: /dev/sd.*
      matchType: "=~"
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: nas-array-diskspace-warning
spec:
  matchers:
    - name: device
      value: /dev/md.*
      matchType: "=~"
    - name: instance
      value: aincrad.home.vzkn.eu:9100
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: nas-memory-high-utilization
spec:
  matchers:
    - name: alertname
      value: NodeMemoryHighUtilization
    - name: instance
      value: aincrad.home.vzkn.eu:9100
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: hpa-maxed-out
spec:
  matchers:
    - name: alertname
      value: KubeHpaMaxedOut
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: bws-cert-expiration
spec:
  matchers:
    - name: alertname
      value: CertManagerCertExpirySoon
    - name: name
      value: bitwarden-tls-certs
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: kube-memory-overcommit
spec:
  matchers:
    - name: alertname
      value: KubeMemoryOvercommit
    - name: severity
      value: warning
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: crd-schema-publisher-cpu-throttling
spec:
  matchers:
    - name: alertname
      value: CPUThrottlingHigh
    - name: namespace
      value: flux-system
    - name: container
      value: crd-schema-publisher
---
# ARC ephemeral runner pods use generic ephemeral volumes
# (pod.spec.volumes[].ephemeral.volumeClaimTemplate). kube-state-metrics doesn't
# correlate these with the owner pod, so they appear "unused" to the alert.
# yaml-language-server: $schema=https://schemas.vzkn.eu/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: arc-ephemeral-runner-pvc-unused
spec:
  matchers:
    - name: alertname
      value: PersistentVolumeClaimUnused
    - name: namespace
      value: actions-runner-system
    - name: persistentvolumeclaim
      value: .*-runner-.*-work
      matchType: "=~"
