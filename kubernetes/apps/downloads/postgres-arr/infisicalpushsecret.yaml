---
# Generate 5 random passwords (via ClusterGenerator pg-password-64) and push
# them to Infisical as the source of truth. Idempotent — on re-reconcile or
# DR, if Infisical already has a value, push does not regenerate.
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalpushsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalPushSecret
metadata:
  name: postgres-arr-role-passwords
spec:
  resyncInterval: 1h
  hostAPI: https://eu.infisical.com/api
  updatePolicy: Ignore  # don't overwrite if Infisical already has the secret
  destination:
    projectSlug: vzkn-eu-v2-zn
    environmentSlug: prod
    secretsPath: /kubernetes/downloads/postgres-arr
  push:
    generators:
      - destinationSecretName: BAZARR_PASSWORD
        generatorRef:
          kind: Password
          name: pg-password-64
      - destinationSecretName: LIDARR_PASSWORD
        generatorRef:
          kind: Password
          name: pg-password-64
      - destinationSecretName: PROWLARR_PASSWORD
        generatorRef:
          kind: Password
          name: pg-password-64
      - destinationSecretName: RADARR_PASSWORD
        generatorRef:
          kind: Password
          name: pg-password-64
      - destinationSecretName: SONARR_PASSWORD
        generatorRef:
          kind: Password
          name: pg-password-64
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
