---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kopiur
spec:
  dependsOn:
    - name: openebs
      namespace: storage
    - name: snapshot-controller
      namespace: storage
  interval: 1h
  path: ./kubernetes/core/kopiur-system/kopiur/app
  postBuild:
    substitute:
      APP: *app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kopiur-system
  wait: true
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopiur-repository
spec:
  dependsOn:
    - name: infisical-operator
      namespace: security
    - name: kopiur
  interval: 1h
  path: ./kubernetes/core/kopiur-system/kopiur/repository
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kopiur-system
  # wait intentionally off: the garage ClusterRepository stays NotReady until
  # the first RepositoryReplication run seeds the bucket
  wait: false
