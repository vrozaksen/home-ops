---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentmemory
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      agentmemory:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 1
        strategy: Recreate
        type: deployment
        containers:
          app:
            image:
              repository: registry.vzkn.eu/containers/agentmemory
              tag: 0.9.28
              digest: sha256:9579cac538fc5c4aed8dfb1e4951e8ac4d9ebd351225a1dcddec3d2af68042f0
            env:
              AGENTMEMORY_DATA_DIR: /data
              III_REST_PORT: "3111"
              VIEWER_ALLOWED_HOSTS: agentmemory.vzkn.eu,agentmemory-api.vzkn.eu
              VIEWER_ALLOWED_ORIGINS: https://agentmemory.vzkn.eu,https://agentmemory-api.vzkn.eu
              AGENTMEMORY_DROP_STALE_INDEX: "true"
              EMBEDDING_PROVIDER: openai
              OPENAI_EMBEDDING_API_KEY: dummy
              OPENAI_EMBEDDING_DIMENSIONS: "1024"
              OPENAI_BASE_URL: http://text-embeddings-inference:8080/v1
              # LLM via Anthropic API
              ANTHROPIC_MODEL: claude-sonnet-4-6
              MAX_TOKENS: "4096"
              AGENTMEMORY_AUTO_COMPRESS: "true"
              GRAPH_EXTRACTION_ENABLED: "true"
              CONSOLIDATION_ENABLED: "true"
              AGENTMEMORY_INJECT_CONTEXT: "true"
            envFrom:
              - secretRef:
                  name: agentmemory-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3111
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3111
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                cpu: "2"
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        controller: agentmemory
        ports:
          http:
            port: 3111
          streams:
            port: 3112
          viewer:
            port: 3113
    route:
      viewer:
        hostnames:
          - "{{ .Release.Name }}.vzkn.eu"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: agentmemory
                port: 3113
      api:
        hostnames:
          - "{{ .Release.Name }}-api.vzkn.eu"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - name: agentmemory
                port: 3111
    persistence:
      data:
        existingClaim: agentmemory
        advancedMounts:
          agentmemory:
            app:
              - path: /data
