---
# yaml-language-server: $schema=https://schemas.vzkn.eu/toolhive.stacklok.dev/virtualmcpserver_v1beta1.json
# External gateway — upstream OIDC via Kanidm. mcp.vzkn.eu exposed publicly.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway
spec:
  authServerConfig:
    issuer: https://mcp.vzkn.eu
    signingKeySecretRefs:
      - name: vmcp-auth-server-secret
        key: signing-key
    hmacSecretRefs:
      - name: vmcp-auth-server-secret
        key: hmac-key
    tokenLifespans:
      accessTokenLifespan: 1h
      refreshTokenLifespan: 168h
      authCodeLifespan: 10m
    upstreamProviders:
      # Upstream IdP: Kanidm (idm.vzkn.eu). client_id == Kanidm resource-server
      # name "mcp-gateway"; secret from kanidm-mcp-gateway-oidc/client-secret.
      # PKCE S256 enforced by Kanidm. No offline_access scope (not granted).
      - name: kanidm
        type: oidc
        oidcConfig:
          issuerUrl: https://idm.vzkn.eu/oauth2/openid/mcp-gateway
          clientId: mcp-gateway
          clientSecretRef:
            name: kanidm-mcp-gateway-oidc
            key: client-secret
          redirectUri: https://mcp.vzkn.eu/oauth/callback
          scopes:
            - openid
            - profile
            - email
            - groups
  groupRef:
    name: mcp-tools
  telemetryConfigRef:
    name: prometheus
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
    operational:
      failureHandling:
        healthCheckInterval: 5m
        statusReportingInterval: 5m
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: external-oidc
      audience: https://mcp.vzkn.eu/mcp
      resourceUrl: https://mcp.vzkn.eu/mcp
      scopes:
        - openid
        - profile
        - email
        - offline_access
  outgoingAuth:
    source: discovered
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          args:
            - serve
            - --config=/etc/vmcp-config/config.yaml
            - --host=0.0.0.0
            - --port=4483
            - --debug
          env:
            - name: INSECURE_DISABLE_URL_VALIDATION
              value: "true"
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/toolhive.stacklok.dev/virtualmcpserver_v1beta1.json
# Internal gateway — anonymous, in-cluster only. For forge pod / AI workloads
# already inside the trust boundary.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway-internal
spec:
  groupRef:
    name: mcp-tools
  telemetryConfigRef:
    name: prometheus
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
  incomingAuth:
    type: anonymous
  outgoingAuth:
    source: discovered
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
