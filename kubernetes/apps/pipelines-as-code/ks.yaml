---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tekton-pac
spec:
  interval: 1h
  path: ./kubernetes/apps/pipelines-as-code/pac
  dependsOn:
    - name: tekton-config
      namespace: tekton-pipelines
  healthCheckExprs:
    - apiVersion: apps/v1
      kind: Deployment
      failed: status.availableReplicas == 0
      current: status.availableReplicas == status.replicas
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: pipelines-as-code
  wait: false
