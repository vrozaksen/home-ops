---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  discoveryFilters:
    - "vrozaksen/*"
  provider:
    name: github
  image: ghcr.io/renovatebot/renovate:43.186.8@sha256:f480e76055df41cc182bb02890ae3d8e3779a87a6d22b5629eb0e2c5b930ccf8
  schedule: "0 * * * *"
  parallelism: 3
  secretRef: renovate-token
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  webhook:
    enabled: true
    authentication:
      enabled: false
