---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  discoveryFilters:
    - "vrozaksen/*"
  provider:
    name: github
  image: ghcr.io/renovatebot/renovate:43.183.1@sha256:29551b7c5fbc8d66668fc7f1149c7b49ad175be474e9b01329d47e81cab0eb52
  schedule: "0 * * * *"
  parallelism: 3
  secretRef: renovate-token
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
  webhook:
    enabled: true
    authentication:
      enabled: false
