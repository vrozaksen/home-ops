---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: towonel-agent
  namespace: network
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/rbac.authorization.k8s.io/clusterrole_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: towonel-agent-discover-nodes
rules:
  - apiGroups:
      - ""
    resources:
      - "nodes"
    verbs:
      - "get"
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/rbac.authorization.k8s.io/clusterrolebinding_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: towonel-agent-discover-nodes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: towonel-agent-discover-nodes
subjects:
  - kind: ServiceAccount
    name: towonel-agent
    namespace: network
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/rbac.authorization.k8s.io/role_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: towonel-agent-discover-services
  namespace: network
rules:
  - apiGroups:
      - ""
    resources:
      - "services"
    verbs:
      - "get"
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/rbac.authorization.k8s.io/rolebinding_v1.json
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: towonel-agent-discover-services
  namespace: network
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: towonel-agent-discover-services
subjects:
  - kind: ServiceAccount
    name: towonel-agent
    namespace: network
