---
name: stash

# Ported from the Unraid dump. Runs as root (image default); /dev/dri for
# hardware transcode. No secrets in env (auth lives in config.yml).
# ⚠️ stashapp/stash has no version label in the dump -> pinning to `latest`.
# Pin to a vX.Y.Z tag to let Renovate open version PRs.

services:
  stash:
    # renovate: datasource=docker depName=stashapp/stash
    image: stashapp/stash:latest
    container_name: stash
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/stash.png"
      net.unraid.docker.webui: "http://[IP]:[PORT:9999]"
    devices:
      - /dev/dri:/dev/dri
    environment:
      TZ: Europe/Warsaw
      STASH_STASH: /data/
      STASH_GENERATED: /generated/
      STASH_METADATA: /metadata/
      STASH_CACHE: /cache/
      STASH_CONFIG_FILE: /root/.stash/config.yml
    ports:
      - "6969:9999"
    volumes:
      - /mnt/blaze/appdata/stash/config:/root/.stash
      - /mnt/blaze/appdata/stash/blobs:/blobs
      - /mnt/blaze/appdata/stash/cache:/cache
      - /mnt/blaze/appdata/stash/gallery:/gallery
      - /mnt/blaze/appdata/stash/generated:/generated
      - /mnt/blaze/appdata/stash/metadata:/metadata
      - /mnt/user/data/om:/data
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "-qO-"
        - "http://127.0.0.1:9999/healthz"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: aincrad
    external: true
