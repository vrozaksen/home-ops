---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name headlamp-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/flux-system/headlamp
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: flux-system
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          OIDC_ISSUER_URL: "https://sso.vzkn.eu/application/o/headlamp/"
          OIDC_CLIENT_ID: '{{ .HEADLAMP_CLIENT_ID.Value }}'
          OIDC_CLIENT_SECRET: '{{ .HEADLAMP_CLIENT_SECRET.Value }}'
          OIDC_SCOPES: "openid email profile"
