---
# yaml-language-server: $schema=https://schemas.vzkn.eu/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: towonel-agent
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  url: https://codeberg.org/towonel/towonel/raw/commit/de570ba3b879c1aad67fa84ba1c528018b8e2575/deploy/grafana/towonel-agent.json
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: towonel-hub
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  url: https://codeberg.org/towonel/towonel/raw/commit/de570ba3b879c1aad67fa84ba1c528018b8e2575/deploy/grafana/towonel-hub.json
