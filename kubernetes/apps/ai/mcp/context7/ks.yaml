---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mcp-context7
spec:
  dependsOn:
    - name: infisical-operator
      namespace: security
    - name: toolhive-config
      namespace: ai
  interval: 1h
  path: ./kubernetes/apps/ai/mcp/context7
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ai
  wait: false
