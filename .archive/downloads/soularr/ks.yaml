---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app soularr
spec:
  components:
    - ../../../components/nfs-scaler
  dependsOn:
    - name: lidarr
      namespace: downloads
    - name: slskd
      namespace: downloads
  interval: 1h
  path: ./kubernetes/apps/downloads/soularr
  postBuild:
    substitute:
      APP: *app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: downloads
  wait: false
