---
# Infisical path: /kubernetes/harbor/harbor/
#   HARBOR_ADMIN_PASSWORD  — initial admin password (admin/harbor user)
#   HARBOR_SECRET_KEY      — 16-char Harbor encryption key (registry passwords, secret storage)
#   HARBOR_S3_ACCESS_KEY   — Garage access key for bucket "harbor"
#   HARBOR_S3_SECRET_KEY   — Garage secret key
#   HARBOR_REGISTRY_HTPASSWD — bcrypt of REGISTRY_PASSWD ("harbor_registry_user:$2a$...")
#   HARBOR_REGISTRY_PASSWD — registry internal password (plain)
#   HARBOR_OIDC_CLIENT_ID  — Authentik OIDC client id
#   HARBOR_OIDC_CLIENT_SECRET — Authentik OIDC client secret
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name harbor-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/harbor/harbor
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: harbor
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          HARBOR_ADMIN_PASSWORD: '{{ .HARBOR_ADMIN_PASSWORD.Value }}'
          secretKey: '{{ .HARBOR_SECRET_KEY.Value }}'
          REGISTRY_STORAGE_S3_ACCESSKEY: '{{ .HARBOR_S3_ACCESS_KEY.Value }}'
          REGISTRY_STORAGE_S3_SECRETKEY: '{{ .HARBOR_S3_SECRET_KEY.Value }}'
          REGISTRY_HTPASSWD: '{{ .HARBOR_REGISTRY_HTPASSWD.Value }}'
          REGISTRY_PASSWD: '{{ .HARBOR_REGISTRY_PASSWD.Value }}'
