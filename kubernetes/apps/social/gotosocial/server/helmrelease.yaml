---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gotosocial
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      gotosocial:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=docker.io/superseriousbusiness/gotosocial
              repository: docker.io/superseriousbusiness/gotosocial
              tag: "0.21.2"
            env:
              TZ: Europe/Warsaw
              GTS_HOST: gts.vzkn.eu
              GTS_ACCOUNT_DOMAIN: vzkn.eu
              GTS_STORAGE_LOCAL_BASE_PATH: /storage
              GTS_LANDING_PAGE_USER: "vrozaksen"
              GTS_METRICS_ENABLED: "true"
              GTS_TRUSTED_PROXIES: "127.0.0.1/32,::1,10.69.0.0/16"
              GTS_ACCOUNTS_ALLOW_CUSTOM_CSS: "true"
              OTEL_EXPORTER_PROMETHEUS_HOST: 0.0.0.0
              OTEL_METRICS_PRODUCERS: prometheus
              OTEL_METRICS_EXPORTER: prometheus
              # OIDC (Authentik)
              GTS_OIDC_ENABLED: "true"
              GTS_OIDC_IDP_NAME: "Authentik"
              GTS_OIDC_ISSUER: "https://sso.vzkn.eu/application/o/gotosocial/"
              GTS_OIDC_SCOPES: "openid,email,profile,groups"
              GTS_OIDC_LINK_EXISTING: "true"
              # SMTP (relay via maddy in network namespace, no auth needed in-cluster)
              GTS_SMTP_HOST: smtp-relay.network.svc.cluster.local
              GTS_SMTP_PORT: "25"
              GTS_SMTP_FROM: "noreply@vzkn.eu"
              GTS_SMTP_DISCLOSE_RECIPIENTS: "false"
              # Database
              GTS_DB_TYPE: postgres
              GTS_DB_ADDRESS: pooler-gotosocial-rw
              GTS_DB_PORT: "5432"
              GTS_DB_DATABASE: gotosocial
              GTS_DB_TLS_MODE: disable
              GTS_DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: postgres-gotosocial-app
                    key: username
              GTS_DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: postgres-gotosocial-app
                    key: password
            envFrom:
              - secretRef:
                  name: gotosocial-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    service:
      app:
        controller: gotosocial
        ports:
          http:
            port: 8080
            primary: true
          metrics:
            port: 9464

    persistence:
      storage:
        existingClaim: gotosocial
        globalMounts:
          - path: /storage
            subPath: data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            interval: 30s
            path: /metrics
