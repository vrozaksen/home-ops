---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app teamspeak
spec:
  dependsOn:
    - name: infisical-operator
      namespace: security
  components:
    - ../../../components/kopiur
    - ../../../components/nfs-scaler
  interval: 1h
  path: ./kubernetes/apps/self-hosted/teamspeak
  postBuild:
    substitute:
      APP: *app
      NS: &ns self-hosted
      KOPIUR_CAPACITY: 5Gi
      KOPIUR_PUID: "9987"
      KOPIUR_PGID: "9987"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: false
