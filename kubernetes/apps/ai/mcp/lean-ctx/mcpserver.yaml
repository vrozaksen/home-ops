---
# yaml-language-server: $schema=https://schemas.vzkn.eu/toolhive.stacklok.dev/mcpserver_v1alpha1.json
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: MCPServer
metadata:
  name: lean-ctx
spec:
  image: registry.vzkn.eu/containers/lean-ctx:3.6.26
  transport: streamable-http
  mcpPort: 8080
  groupRef:
    name: mcp-tools
  permissionProfile:
    type: builtin
    name: network
  externalAuthConfigRef:
    name: lean-ctx-bearer
  env:
    - name: HOME
      value: /tmp
    - name: XDG_CONFIG_HOME
      value: /tmp
  podTemplateSpec:
    spec:
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lean-ctx
      containers:
        - name: mcp
          command:
            - /usr/bin/catatonit
            - --
            - /bin/sh
            - -c
          args:
            - exec lean-ctx serve --host=0.0.0.0 --port=8080 --auth-token="$LEAN_CTX_AUTH_TOKEN"
          env:
            - name: LEAN_CTX_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: lean-ctx-mcp-secret
                  key: LEAN_CTX_AUTH_TOKEN
          volumeMounts:
            - name: data
              mountPath: /tmp
