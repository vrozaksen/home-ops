---
# yaml-language-server: $schema=https://schemas.vzkn.eu/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: spegel
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.7.3
  url: oci://ghcr.io/spegel-org/helm-charts/spegel
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
spec:
  chartRef:
    kind: OCIRepository
    name: spegel
  interval: 1h
  values:
    grafanaDashboard:
      enabled: false
    service:
      registry:
        hostPort: 29999
    serviceMonitor:
      enabled: true
    spegel:
      containerdSock: /run/containerd/containerd.sock
      containerdRegistryConfigPath: /etc/cri/conf.d/hosts
      # Resolution order per registry: peer (Spegel) → Harbor proxy (Talos patch
      # with override_path) → upstream. Harbor target lives in Talos
      # machine-registries.yaml, NOT here, because it needs override_path.
      mirroredRegistries:
        - https://docker.io
        - https://ghcr.io
        - https://quay.io
        - https://gcr.io
        - https://mirror.gcr.io
        - https://registry.k8s.io
        - https://public.ecr.aws
        - https://mcr.microsoft.com
        - https://nvcr.io
        - https://cgr.dev
        - https://code.forgejo.org
        - https://codeberg.org
        - https://git.erwanleboucher.dev
        - https://cr.fluentbit.io
        - https://registry.access.redhat.com
        - https://gsoci.azurecr.io
      mirrorResolveRetries: 3
      mirrorResolveTimeout: 30ms
      prependExisting: true
