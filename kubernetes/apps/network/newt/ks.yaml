---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: newt
spec:
  dependsOn:
    - name: infisical-operator
      namespace: security
  interval: 1h
  path: ./kubernetes/apps/network/newt/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: newt-dns
spec:
  dependsOn:
    - name: newt
    - name: ovh-dns
  interval: 1h
  path: ./kubernetes/apps/network/newt/dns
  postBuild:
    substituteFrom:
      - kind: Secret
        name: newt-secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
