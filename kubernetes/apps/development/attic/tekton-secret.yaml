---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
# Two K8s Secrets emitted from single Infisical folder /kubernetes/development/tekton/attic:
#   - attic-push-secret: ATTIC_TOKEN (mounted as env in nix-build/attic-push Tasks)
#   - attic-cache-public-key: ATTIC_CACHE_PUBLIC_KEY (used in nix.conf trusted-public-keys)
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: attic-secrets
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/development/tekton/attic
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: attic-push-secret
      secretNamespace: development
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          ATTIC_TOKEN: '{{ .ATTIC_TOKEN.Value }}'
    - secretName: attic-cache-public-key
      secretNamespace: development
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          ATTIC_CACHE_PUBLIC_KEY: '{{ .ATTIC_CACHE_PUBLIC_KEY.Value }}'
