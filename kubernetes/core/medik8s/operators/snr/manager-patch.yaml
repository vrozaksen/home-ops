---
# Mount webhook cert + pin the per-node agent image (SELF_NODE_REMEDIATION_IMAGE
# is a literal ${IMG} placeholder upstream; images: does not touch env values).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-node-remediation-controller-manager
spec:
  template:
    spec:
      containers:
        - name: manager
          env:
            - name: SELF_NODE_REMEDIATION_IMAGE
              value: quay.io/medik8s/self-node-remediation-operator:v0.12.1
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          volumeMounts:
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: cert
              readOnly: true
      volumes:
        - name: cert
          secret:
            defaultMode: 420
            secretName: webhook-server-cert
