---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: forgejo
spec:
  discoveryFilters:
    - "vrozaksen/*"
  provider:
    name: forgejo
    endpoint: https://git.vzkn.eu
  image: ghcr.io/renovatebot/renovate:43.272.8@sha256:ee38fed0de334fad155f7d93f0b8943ef40c9b1ee1c39113fc1b3c87b58454a1
  schedule: "0 * * * *"
  parallelism: 3
  secretRef: renovate-forgejo-token
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
    - name: RENOVATE_AUTODISCOVER
      value: "true"
    - name: RENOVATE_AUTODISCOVER_FILTER
      value: "vrozaksen/*"
    - name: RENOVATE_GIT_AUTHOR
      value: "Renovate Bot <renovate@vzkn.eu>"
    - name: RENOVATE_USERNAME
      value: "renovate-bot"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  webhook:
    enabled: true
    authentication:
      enabled: false
