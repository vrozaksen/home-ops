---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  # Explicit allowlist: only repos still primary on GitHub.
  # Forgejo-migrated repos (renovate-config, vrozaksen, vzkn-eu, nix-config, ...)
  # are scanned by the forgejo RenovateJob — having both jobs scan the same
  # content (via push-mirror) causes force-push lease conflicts.
  discoveryFilters:
    - "vrozaksen/home-ops"
  provider:
    name: github
  image: ghcr.io/renovatebot/renovate:43.204.0@sha256:4e2b3d8fa3f28b80efbfbdf83a645cdd2f811acaf0b7f3a751e971ea6de09fe3
  schedule: "0 * * * *"
  parallelism: 3
  secretRef: renovate-token
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  webhook:
    enabled: true
    authentication:
      enabled: false
