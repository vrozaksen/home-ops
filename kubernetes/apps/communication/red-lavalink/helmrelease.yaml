---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: red-lavalink
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      red-lavalink:
        containers:
          app:
            image:
              repository: ghcr.io/vrozaksen/red-lavalink
              tag: 3.7.13@sha256:c40674e8aed99e6ca742611ea5d4c495f8c3846073a3170c4ef9053a84e612df
            env:
              JAVA_OPTS: "-Xmx4G"
              PUID: &uid 1000
              PGID: &gid 100
              SERVER_PORT: &port 2333
            envFrom:
              - secretRef:
                  name: red-lavalink-secret
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30
              liveness:
                enabled: false
              readiness:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resizePolicy:
              - resourceName: memory
                restartPolicy: RestartContainer
            resources:
              requests:
                cpu: 200m
                memory: 2Gi
              limits:
                memory: 5Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: *uid
        runAsGroup: *gid
        fsGroup: *gid
        fsGroupChangePolicy: OnRootMismatch
    service:
      red-lavalink:
        controller: red-lavalink
        ports:
          http:
            port: *port
    persistence:
      data:
        type: emptyDir
