---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kafka
spec:
  components:
    - ../../../components/volsync
  dependsOn:
    - name: priority-classes
      namespace: flux-system
  interval: 1h
  path: ./kubernetes/apps/sentry/kafka
  postBuild:
    substitute:
      APP: *app
      NS: &ns sentry
      VOLSYNC_CAPACITY: 20Gi
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "100"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  timeout: 5m
  wait: false
