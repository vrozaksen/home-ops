---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app forgejo
spec:
  components:
    - ../../../../components/anubis
    - ../../../../components/cnpg/restore
    - ../../../../components/dragonfly
    - ../../../../components/volsync
  dependsOn:
    - name: dragonfly-operator
      namespace: database
    - name: infisical-operator
      namespace: security
    - name: plugin-barman-cloud
      namespace: database
    - name: priority-classes
      namespace: flux-system
  healthCheckExprs:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      failed: status.phase != 'Ready'
      current: status.phase == 'Ready'
  interval: 1h
  path: ./kubernetes/platform/development/forgejo/app
  postBuild:
    substitute:
      APP: *app
      NS: &ns development
      CNPG_SIZE: 5Gi
      VOLSYNC_CAPACITY: 50Gi
      VOLSYNC_STORAGECLASS: ceph-block
      VOLSYNC_ACCESSMODES: ReadWriteOnce
      ANUBIS_TARGET: "http://forgejo-http.development.svc.cluster.local:3000"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: true
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app forgejo-buildkit
spec:
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
    - name: infisical-operator
      namespace: security
  interval: 1h
  path: ./kubernetes/platform/development/forgejo/buildkit
  postBuild:
    substitute:
      APP: *app
      NS: &ns development
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: true
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app forgejo-runner
spec:
  dependsOn:
    - name: forgejo
    - name: forgejo-buildkit
  interval: 1h
  path: ./kubernetes/platform/development/forgejo/runner
  postBuild:
    substitute:
      APP: *app
      NS: &ns development
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: true
