---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name tekton-results-s3-logs
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/development/tekton
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: tekton-pipelines
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          S3_BUCKET_NAME: tekton-results-logs
          S3_ENDPOINT: https://api.s3.vzkn.eu
          S3_HOSTNAME_IMMUTABLE: "true"
          S3_REGION: eu-central-1
          S3_MULTI_PART_SIZE: "5242880"
          S3_ACCESS_KEY_ID: '{{ .TEKTON_RESULTS_LOGS_ACCESS_KEY_ID.Value }}'
          S3_SECRET_ACCESS_KEY: '{{ .TEKTON_RESULTS_LOGS_SECRET_ACCESS_KEY.Value }}'
