---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app factorio
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      factorio:
        replicas: 1
        type: statefulset
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: factoriotools/factorio
              tag: 2.0.76-rootless
            env:
              GENERATE_NEW_SAVE: false
              LOAD_LATEST_SAVE: true
              PORT: &port 34197
              BIND: 0.0.0.0
              RCON_PORT: &rconPort 27015
              SAVE_NAME: nullius
              UPDATE_MODS_ON_START: true
              UPDATE_IGNORE: nullius
              CONSOLE_LOG_LOCATION: /factorio/console.log
              DLC_SPACE_AGE: false
              MODS: /factorio/mods
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                cpu: 2
                memory: 8Gi
      filebrowser:
        strategy: Recreate
        containers:
          app:
            image:
              repository: filebrowser/filebrowser
              tag: v2.53.1
            env:
              FB_NOAUTH: true
              FB_PORT: &fbPort 80
              FB_ROOT: /srv/factorio
              FB_DATABASE: /db/database.db
            probes:
              liveness: &fbProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *fbPort
                  periodSeconds: 30
                  failureThreshold: 3
              readiness: *fbProbes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: factorio
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: Always
    service:
      app:
        controller: factorio
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          lbipam.cilium.io/ips: 10.10.0.61
          external-dns.alpha.kubernetes.io/hostname: factorio.vzkn.eu
        ports:
          gametcp:
            port: *rconPort
          gameudp:
            port: *port
            protocol: UDP
      filebrowser:
        controller: filebrowser
        ports:
          http:
            port: *fbPort
    route:
      filebrowser:
        hostnames:
          - "factorio-files.vzkn.eu"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: filebrowser
                port: *fbPort
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          factorio:
            app:
              - path: /factorio
          filebrowser:
            app:
              - path: /db
                subPath: filebrowser
              - path: /srv/factorio
      config:
        type: secret
        name: factorio-config
        defaultMode: 0644
        advancedMounts:
          factorio:
            app:
              - path: /factorio/config/server-settings.json
                subPath: server-settings.json
                readOnly: true
              - path: /factorio/config/server-adminlist.json
                subPath: server-adminlist.json
                readOnly: true
      tmp:
        type: emptyDir
