---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app zot
spec:
  components:
    - ../../../components/volsync
  dependsOn:
    - name: envoy-gateway
      namespace: network
    - name: infisical-operator
      namespace: security
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/platform/development/zot
  postBuild:
    substitute:
      APP: *app
      NS: &ns development
      VOLSYNC_CAPACITY: 2Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: false
