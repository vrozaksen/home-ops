---
# yaml-language-server: $schema=https://schemas.vzkn.eu/monitoring.coreos.com/servicemonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sentry-symbolicator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sentry
      app.kubernetes.io/component: symbolicator
  namespaceSelector:
    matchNames:
      - sentry
  endpoints:
    - port: sentry
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
