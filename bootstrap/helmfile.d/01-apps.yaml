---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

repositories:
  - name: infisical
    url: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.2
    values:
      - '../values.yaml.gotmpl'

  - name: coredns
    namespace: kube-system
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.45.2
    values:
      - '../values.yaml.gotmpl'
    needs:
      - 'kube-system/cilium'

  - name: spegel
    namespace: kube-system
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.6.0
    values:
      - '../values.yaml.gotmpl'
    needs:
      - 'kube-system/coredns'

  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.1
    values:
      - '../values.yaml.gotmpl'
    hooks:
      - # Apply cluster secret store configuration
        events:
          - postsync
        command: kubectl
        args:
          - apply
          - --namespace=cert-manager
          - --server-side
          - --field-manager=kustomize-controller
          - --filename
          - ../../kubernetes/apps/cert-manager/cert-manager/app/clusterissuers.yaml
          - --wait=true
        showlogs: true
    needs:
      - 'kube-system/spegel'

  - name: infisical-secrets-operator
    namespace: security
    chart: infisical/secrets-operator
    version: 0.10.29
    values:
      - controllerManager:
          manager:
            image:
              repository: infisical/kubernetes-operator
              tag: v0.10.27
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
          nodeSelector:
            node-role.kubernetes.io/control-plane: ""
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
    needs:
      - 'kube-system/spegel'
    hooks:
      - # Add Helm ownership metadata to existing infisical CRDs
        events:
          - presync
        command: bash
        args:
          - -c
          - |
            for crd in $(kubectl get crd | grep infisical | awk '{print $1}'); do
              echo "Adding Helm metadata to $crd..."
              kubectl label crd $crd app.kubernetes.io/managed-by=Helm --overwrite
              kubectl annotate crd $crd meta.helm.sh/release-name=infisical-secrets-operator --overwrite
              kubectl annotate crd $crd meta.helm.sh/release-namespace=security --overwrite
            done
        showlogs: true
    force: true

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.45.1
    values:
      - '../values.yaml.gotmpl'
    needs:
      - 'security/infisical-secrets-operator'

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.45.1
    values:
      - '../values.yaml.gotmpl'
    needs:
      - 'flux-system/flux-operator'
