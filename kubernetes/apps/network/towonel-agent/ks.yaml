---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: towonel-agent
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: towonel-agent
  dependsOn:
    - name: infisical-operator
      namespace: security
    - name: ovh-dns
      namespace: network
  interval: 1h
  path: ./kubernetes/apps/network/towonel-agent
  postBuild:
    substituteFrom:
      - kind: Secret
        name: towonel-agent-secret
        optional: true
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
