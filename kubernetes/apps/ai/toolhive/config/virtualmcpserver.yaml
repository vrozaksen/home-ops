---
# yaml-language-server: $schema=https://schemas.vzkn.eu/toolhive.stacklok.dev/virtualmcpserver_v1beta1.json
# External gateway — OIDC via Authentik. mcp.vzkn.eu exposed publicly.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway
spec:
  authServerConfig:
    issuer: https://mcp.vzkn.eu
    signingKeySecretRefs:
      - name: vmcp-auth-server-secret
        key: signing-key
    hmacSecretRefs:
      - name: vmcp-auth-server-secret
        key: hmac-key
    tokenLifespans:
      accessTokenLifespan: 1h
      refreshTokenLifespan: 168h
      authCodeLifespan: 10m
    upstreamProviders:
      - name: authentik
        type: oidc
        oidcConfig:
          issuerUrl: https://sso.vzkn.eu/application/o/mcp-gateway/
          clientId: ${MCP_GATEWAY_CLIENT_ID}
          clientSecretRef:
            name: vmcp-authentik-oidc
            key: MCP_GATEWAY_CLIENT_SECRET
          redirectUri: https://mcp.vzkn.eu/oauth/callback
          scopes:
            - openid
            - profile
            - email
  groupRef:
    name: mcp-tools
  telemetryConfigRef:
    name: prometheus
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
    operational:
      failureHandling:
        healthCheckInterval: 5m
        statusReportingInterval: 5m
  incomingAuth:
    type: oidc
    oidcConfigRef:
      name: external-oidc
      audience: https://mcp.vzkn.eu/mcp
      resourceUrl: https://mcp.vzkn.eu/mcp
      scopes:
        - openid
        - profile
        - email
        - offline_access
  outgoingAuth:
    source: discovered
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          args:
            - serve
            - --config=/etc/vmcp-config/config.yaml
            - --host=0.0.0.0
            - --port=4483
            - --debug
          env:
            - name: INSECURE_DISABLE_URL_VALIDATION
              value: "true"
---
# yaml-language-server: $schema=https://schemas.vzkn.eu/toolhive.stacklok.dev/virtualmcpserver_v1beta1.json
# Internal gateway — anonymous, in-cluster only. For forge pod / AI workloads
# already inside the trust boundary.
apiVersion: toolhive.stacklok.dev/v1beta1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway-internal
spec:
  groupRef:
    name: mcp-tools
  telemetryConfigRef:
    name: prometheus
  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: "{workload}_"
  incomingAuth:
    type: anonymous
  outgoingAuth:
    source: discovered
  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
