---
# Per-app databases inside the shared postgres-arr cluster.
# Owner = `arr` (CNPG-created via initdb bootstrap, secret postgres-arr-app).
# Apps connect via:
#   POSTGRES_HOST=pooler-arr-rw, POSTGRES_DATABASE=<this name>, user/pass from postgres-arr-app
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: lidarr
spec:
  cluster:
    name: postgres-arr
  name: lidarr
  owner: arr
---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: sonarr
spec:
  cluster:
    name: postgres-arr
  name: sonarr
  owner: arr
