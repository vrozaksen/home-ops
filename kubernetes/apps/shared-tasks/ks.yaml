---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
# Deploys reusable Tekton Tasks to shared-tasks ns. Depends on tekton-config
# because Task CRD comes from TektonPipeline component (installed by operator
# once TektonConfig is Ready).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tekton-shared-tasks
spec:
  interval: 1h
  path: ./kubernetes/apps/shared-tasks/tasks
  dependsOn:
    - name: tekton-config
      namespace: tekton-pipelines
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: shared-tasks
  wait: false
