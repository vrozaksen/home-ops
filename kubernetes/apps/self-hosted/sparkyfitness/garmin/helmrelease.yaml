---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sparkyfitness-garmin
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      garmin:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/codewithcj/sparkyfitness-garmin
              tag: v0.16.5.6@sha256:a706fc197a4672282469871bf82f6125f6fbff18c79a578676e6b0c73f553702
            env:
              SPARKY_FITNESS_DB_HOST: pooler-sparkyfitness-rw
              SPARKY_FITNESS_DB_PORT: "5432"
              SPARKY_FITNESS_DB_NAME:
                valueFrom:
                  secretKeyRef:
                    name: postgres-sparkyfitness-app
                    key: dbname
              SPARKY_FITNESS_DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: postgres-sparkyfitness-app
                    key: username
              SPARKY_FITNESS_DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: postgres-sparkyfitness-app
                    key: password
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    service:
      app:
        controller: garmin
        ports:
          http:
            port: *port
