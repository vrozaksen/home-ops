---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name zot-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/development/zot
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: development
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          htpasswd: '{{ .HTPASSWD.Value }}'
          oidc-credentials.json: |
            {
              "clientid": "{{ .ZOT_CLIENT_ID.Value }}",
              "clientsecret": "{{ .ZOT_CLIENT_SECRET.Value }}"
            }
          AWS_ACCESS_KEY_ID: '{{ .ZOT_ACCESS_KEY_ID.Value }}'
          AWS_SECRET_ACCESS_KEY: '{{ .ZOT_SECRET_ACCESS_KEY.Value }}'
