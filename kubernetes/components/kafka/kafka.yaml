---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: &name ${APP}
  labels:
    strimzi.io/cluster: kafka-${APP}
spec:
  replicas: ${KAFKA_REPLICAS:=1}
  roles:
    - controller
    - broker
  storage:
    type: persistent-claim
    size: ${KAFKA_SIZE:=20Gi}
    class: ${KAFKA_STORAGECLASS:=ceph-block}
    deleteClaim: false
  resources:
    requests:
      cpu: ${KAFKA_REQUESTS_CPU:=100m}
      memory: ${KAFKA_REQUESTS_MEMORY:=1Gi}
    limits:
      memory: ${KAFKA_LIMITS_MEMORY:=3Gi}
  jvmOptions:
    -Xms: ${KAFKA_JVM_XMS:=512m}
    -Xmx: ${KAFKA_JVM_XMX:=2g}
  template:
    pod:
      metadata:
        labels:
          app.kubernetes.io/name: kafka
          app.kubernetes.io/instance: *name
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      priorityClassName: ${KAFKA_PRIORITY_CLASS:=cluster-low}
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-${APP}
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: ${KAFKA_VERSION:=4.0.0}
    metadataVersion: ${KAFKA_METADATA_VERSION:=4.0-IV3}
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
        authentication:
          type: scram-sha-512
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      message.max.bytes: ${KAFKA_MESSAGE_MAX_BYTES:=50000000}
      max.request.size: ${KAFKA_MESSAGE_MAX_BYTES:=50000000}
      replica.fetch.max.bytes: ${KAFKA_MESSAGE_MAX_BYTES:=50000000}
      compression.type: lz4
      log.retention.hours: ${KAFKA_RETENTION_HOURS:=72}
      auto.create.topics.enable: ${KAFKA_AUTO_CREATE_TOPICS:=false}
    authorization:
      type: simple
      superUsers:
        - ${APP}
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: 25m
          memory: 96Mi
        limits:
          memory: 192Mi
    userOperator:
      resources:
        requests:
          cpu: 25m
          memory: 96Mi
        limits:
          memory: 192Mi
    template:
      pod:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node-role.kubernetes.io/control-plane
                      operator: DoesNotExist
