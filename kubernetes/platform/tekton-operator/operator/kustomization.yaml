---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # https://github.com/tektoncd/operator/releases
  # renovate: depName=tektoncd/operator datasource=github-releases
  - https://github.com/tektoncd/operator/releases/download/v0.79.1/release.yaml
patches:
  - target:
      kind: Deployment
      name: tekton-operator
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
      - op: add
        path: /spec/template/spec/containers/1/resources
        value:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
  - target:
      kind: Deployment
      name: tekton-operator-webhook
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 128Mi
