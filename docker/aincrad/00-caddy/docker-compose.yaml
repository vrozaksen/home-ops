---
name: caddy

services:
  caddy:
    # renovate: datasource=docker depName=ghcr.io/vrozaksen/caddy-l4-ovh
    image: ghcr.io/vrozaksen/caddy-l4-ovh:2.11.3
    container_name: caddy
    restart: unless-stopped
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/caddy.png"
    environment:
      TZ: Europe/Warsaw
    ports:
      - 443:443
      - 443:443/udp  # HTTP/3
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      # Wildcard cert synced from the cluster by the host cert-sync script
      - /mnt/blaze/appdata/caddy/data/certificates:/certs:ro
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy-data:
  caddy-config:

configs:
  caddyfile:
    file: ./config/Caddyfile

networks:
  default:
    name: aincrad
    external: true
