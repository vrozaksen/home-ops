---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: nix-config-pac
spec:
  interval: 1h
  path: ./kubernetes/apps/pipelines-as-code/repos/nix-config
  dependsOn:
    - name: infisical-operator
      namespace: security
    - name: tekton-pac
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: development
  wait: false
