---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app pgadmin
spec:
  components:
    - ../../../components/kopiur
  dependsOn:
    - name: cloudnative-pg
      namespace: database
    - name: infisical-operator
      namespace: security
    - name: kanidm
      namespace: security
    - name: kopiur
      namespace: kopiur-system
    - name: rook-ceph-cluster
      namespace: rook-ceph
  interval: 1h
  path: ./kubernetes/platform/database/pgadmin
  postBuild:
    substitute:
      APP: *app
      NS: &ns database
      KOPIUR_CAPACITY: 1Gi
      KOPIUR_PUID: "5050"
      KOPIUR_PGID: "5050"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: false
