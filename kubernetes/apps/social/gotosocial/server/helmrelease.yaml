---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gotosocial
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      gotosocial:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=docker.io/superseriousbusiness/gotosocial
              repository: docker.io/superseriousbusiness/gotosocial
              tag: "0.21.3"
            env:
              TZ: Europe/Warsaw
              GTS_HOST: gts.vzkn.eu
              GTS_ACCOUNT_DOMAIN: vzkn.eu
              GTS_STORAGE_LOCAL_BASE_PATH: /storage
              GTS_LANDING_PAGE_USER: "vrozaksen"
              GTS_METRICS_ENABLED: "true"
              GTS_TRUSTED_PROXIES: "127.0.0.1/32,::1,10.69.0.0/16,10.100.0.0/16"
              GTS_HTTP_CLIENT_ALLOW_IPS: "10.10.0.91/32,10.69.0.0/16,10.96.0.0/12"
              GTS_ACCOUNTS_ALLOW_CUSTOM_CSS: "true"
              OTEL_EXPORTER_PROMETHEUS_HOST: 0.0.0.0
              OTEL_METRICS_PRODUCERS: prometheus
              OTEL_METRICS_EXPORTER: prometheus
              # OIDC via Kanidm (discovery on issuer; PKCE S256 auto-negotiated).
              GTS_OIDC_ENABLED: "true"
              GTS_OIDC_IDP_NAME: "Kanidm"
              GTS_OIDC_ISSUER: "https://idm.vzkn.eu/oauth2/openid/gotosocial"
              GTS_OIDC_SCOPES: "openid,email,profile,groups"
              # Link OIDC logins to existing local accounts by email
              GTS_OIDC_LINK_EXISTING: "true"
              # SMTP (relay via maddy in network namespace, no auth needed in-cluster)
              GTS_SMTP_HOST: smtp-relay.network.svc.cluster.local
              GTS_SMTP_PORT: "25"
              GTS_SMTP_FROM: "noreply@vzkn.eu"
              GTS_SMTP_DISCLOSE_RECIPIENTS: "false"
              # Database
              GTS_DB_TYPE: sqlite
              GTS_DB_ADDRESS: /storage/sqlite.db
              GTS_DB_SQLITE_JOURNAL_MODE: WAL
              GTS_DB_SQLITE_SYNCHRONOUS: NORMAL
              GTS_OIDC_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: kanidm-gotosocial-oidc
                    key: client-id
              GTS_OIDC_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: kanidm-gotosocial-oidc
                    key: client-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    service:
      app:
        controller: gotosocial
        ports:
          http:
            port: 8080
            primary: true
          metrics:
            port: 9464

    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            interval: 30s
            path: /metrics

    persistence:
      storage:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /storage
            subPath: data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
