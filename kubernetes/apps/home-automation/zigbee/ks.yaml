---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app zigbee
spec:
  components:
    - ../../../components/oidc-auth
    - ../../../components/volsync
    - ../../../components/zeroscaler
  dependsOn:
    - name: kanidm
      namespace: security
    - name: mosquitto
      namespace: database
    - name: prometheus-adapter
      namespace: observability
  interval: 1h
  path: ./kubernetes/apps/home-automation/zigbee
  postBuild:
    substitute:
      APP: *app
      NS: &ns home-automation
      ZEROSCALER_JOB_NAME: slzb_probe
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *ns
  wait: false
