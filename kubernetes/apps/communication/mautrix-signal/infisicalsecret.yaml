---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name mautrix-signal-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/communication/mautrix-signal
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: communication
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          MAUTRIX_SIGNAL_APPSERVICE__AS_TOKEN: '{{ .AS_TOKEN.Value }}'
          MAUTRIX_SIGNAL_APPSERVICE__HS_TOKEN: '{{ .HS_TOKEN.Value }}'
          MAUTRIX_SIGNAL_ENCRYPTION__PICKLE_KEY: '{{ .PICKLE_KEY.Value }}'
          MAUTRIX_SIGNAL_PROVISIONING__SHARED_SECRET: '{{ .PROVISIONING_TOKEN.Value }}'
