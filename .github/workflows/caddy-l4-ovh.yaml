---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build caddy-l4-ovh

on:
  push:
    branches:
      - main
    paths:
      - docker/bifrost/03-caddy-l4/Dockerfile
      - .github/workflows/caddy-l4-ovh.yaml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push caddy-l4-ovh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Caddy version
        id: ver
        run: |
          v=$(grep -oP 'CADDY_VERSION=\K[\d.]+' docker/bifrost/03-caddy-l4/Dockerfile)
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: docker/bifrost/03-caddy-l4
          file: docker/bifrost/03-caddy-l4/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/caddy-l4-ovh:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/caddy-l4-ovh:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
