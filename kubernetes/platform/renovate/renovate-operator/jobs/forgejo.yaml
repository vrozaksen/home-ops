---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: forgejo
spec:
  discoveryFilters:
    - "vrozaksen/*"
  provider:
    name: forgejo
    endpoint: https://git.vzkn.eu
  image: ghcr.io/renovatebot/renovate:43.278.2@sha256:41316d8e528cdd92fd3f4f08ea00f0085fb6a2a2b9d5b3480f64e5e9cb5ccd3f
  schedule: "0 * * * *"
  parallelism: 3
  secretRef: renovate-forgejo-token
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
    - name: RENOVATE_AUTODISCOVER
      value: "true"
    - name: RENOVATE_AUTODISCOVER_FILTER
      value: "vrozaksen/*"
    - name: RENOVATE_GIT_AUTHOR
      value: "Renovate Bot <renovate@vzkn.eu>"
    - name: RENOVATE_USERNAME
      value: "renovate-bot"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  webhook:
    enabled: true
    authentication:
      enabled: false
