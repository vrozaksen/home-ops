---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name defectdojo
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/development/defectdojo
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: development
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          DD_SECRET_KEY: '{{ .DD_SECRET_KEY.Value }}'
          OIDC_CLIENT_ID: '{{ .DEFECTDOJO_CLIENT_ID.Value }}'
          OIDC_CLIENT_SECRET: '{{ .DEFECTDOJO_CLIENT_SECRET.Value }}'
          METRICS_HTTP_AUTH_PASSWORD: '{{ .METRICS_HTTP_AUTH_PASSWORD.Value }}'
