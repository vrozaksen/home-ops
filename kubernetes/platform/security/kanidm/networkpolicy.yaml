---
# yaml-language-server: $schema=https://schemas.vzkn.eu/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kanidm
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kanidm
  # Ingress-only: egress stays open (SMTP relay, DNS, GitHub if ever needed, k8s API for provision).
  ingress:
    # Web UI / OIDC is a public-facing endpoint anyway — allow any in-cluster source
    # (Envoy gateway hairpin, OIDC app backends, kubelet probes, cilium-health).
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "8443"
              protocol: TCP
    # LDAPS arrives via the external gateway's :3636 TLS-passthrough (emby on aincrad,
    # continuwuity) → source is the envoy-external pod. Plus direct in-cluster from communication.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            gateway.envoyproxy.io/owning-gateway-name: envoy-external
        - matchLabels:
            io.kubernetes.pod.namespace: communication
      toPorts:
        - ports:
            - port: "3636"
              protocol: TCP
