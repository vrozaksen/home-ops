---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  # Explicit allowlist: only repos still primary on GitHub.
  # Forgejo-migrated repos (renovate-config, vrozaksen, vzkn-eu, nix-config, ...)
  # are scanned by the forgejo RenovateJob — having both jobs scan the same
  # content (via push-mirror) causes force-push lease conflicts.
  discoveryFilters:
    - "vrozaksen/home-ops"
  provider:
    name: github
  image: ghcr.io/renovatebot/renovate:43.211.0@sha256:fa4a674597a1ed17ba15d7654484ed7554d4a8d37d631f0a22a5e6125a38a4d9
  schedule: "0 * * * *"
  parallelism: 3
  secretRef: renovate-token
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  webhook:
    enabled: true
    authentication:
      enabled: false
