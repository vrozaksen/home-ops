---
# yaml-language-server: $schema=https://schemas.vzkn.eu/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: envoy-gateway-rules
spec:
  groups:
    - name: envoy-gateway.rules
      rules:
        - alert: EnvoyClusterStaleEndpoint
          expr: |-
            sum by (envoy_cluster_name, namespace, pod) (
              rate(envoy_cluster_upstream_cx_connect_fail{envoy_cluster_name=~"httproute/.+"}[5m])
            ) > 0.5
          for: 15m
          annotations:
            summary: >-
              Envoy cluster {{ $labels.envoy_cluster_name }} accumulating connection failures
            description: |-
              Envoy proxy {{ $labels.pod }} in {{ $labels.namespace }} is seeing sustained
              upstream connection failures (>0.5/s for 15m) for cluster
              {{ $labels.envoy_cluster_name }}.
              Two likely causes:
              1. Backend pod is actually unhealthy (probes failing, crashloop) — check pod state.
              2. Stale EDS — envoy holds old pod IP after backend reschedule. Compare envoy's
                 cluster upstream IP (config_dump on :19000) vs current EndpointSlice.
                 Fix: `kubectl rollout restart -n network deployment/envoy-internal|external`.
          labels:
            severity: warning

        - alert: EnvoyControlPlaneDisconnected
          expr: envoy_control_plane_connected_state == 0
          for: 5m
          annotations:
            summary: >-
              Envoy proxy {{ $labels.pod }} disconnected from xDS control plane
            description: |-
              Envoy proxy {{ $labels.pod }} in {{ $labels.namespace }} has lost its xDS
              connection to envoy-gateway for >5m. Static config still served but no updates
              (new endpoints, route changes) will reach this proxy.
          labels:
            severity: warning
