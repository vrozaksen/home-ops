---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kopiur.home-operations.com/restore_v1alpha1.json
# Passive deploy-or-restore populator: hydrates the PVC from the latest
# snapshot, or provisions it empty when the policy has none yet
apiVersion: kopiur.home-operations.com/v1alpha1
kind: Restore
metadata:
  name: ${APP}
spec:
  credentialProjection:
    enabled: true
  mover:
    podSecurityContext:
      fsGroup: ${KOPIUR_PGID:=100}
    securityContext:
      runAsUser: ${KOPIUR_PUID:=1000}
      runAsGroup: ${KOPIUR_PGID:=100}
  policy:
    onMissingSnapshot: Continue
  source:
    fromPolicy:
      name: ${APP}
      offset: 0
  target:
    populator: {}
