---
# Cluster-scoped password generator. Reusable across any shared CNPG cluster
# that needs ManagedRole credentials — not specific to postgres-arr.
# If/when a second shared cluster appears, this can move to a platform-level dir.
apiVersion: secrets.infisical.com/v1alpha1
kind: ClusterGenerator
metadata:
  name: pg-password-64
spec:
  kind: Password
  generator:
    passwordSpec:
      length: 64
      digits: 8
      symbols: 8
      noUpper: false
      allowRepeat: true
