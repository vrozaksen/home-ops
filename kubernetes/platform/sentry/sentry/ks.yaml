---
# yaml-language-server: $schema=https://schemas.vzkn.eu/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app sentry
spec:
  components:
    - ../../../components/cnpg/initdb
    - ../../../components/clickhouse
    - ../../../components/dragonfly
    - ../../../components/kafka
  dependsOn:
    - name: altinity-clickhouse-operator
      namespace: database
    - name: dragonfly-operator
      namespace: database
    - name: infisical-operator
      namespace: security
    - name: plugin-barman-cloud
      namespace: database
    - name: strimzi-kafka-operator
      namespace: database
  healthCheckExprs:
    - apiVersion: clickhouse.altinity.com/v1
      kind: ClickHouseInstallation
      failed: status.status != 'Completed'
      current: status.status == 'Completed'
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      failed: status.phase != 'ready'
      current: status.phase == 'ready'
    - apiVersion: kafka.strimzi.io/v1beta2
      kind: Kafka
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
  interval: 1h
  path: ./kubernetes/platform/sentry/sentry
  postBuild:
    substitute:
      APP: *app
      NS: *app
      CNPG_SIZE: 10Gi
      CNPG_POOLER_MODE: transaction
      KAFKA_SIZE: 20Gi
      KAFKA_RETENTION_HOURS: "72"
      CH_SIZE: 50Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *app
  timeout: 15m
  wait: false
