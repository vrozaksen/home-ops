---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: home-ops
spec:
  # Explicit allowlist: only repos still primary on GitHub.
  # Forgejo-migrated repos (renovate-config, vrozaksen, vzkn-eu, nix-config, ...)
  # are scanned by the forgejo RenovateJob — having both jobs scan the same
  # content (via push-mirror) causes force-push lease conflicts.
  discoveryFilters:
    - "vrozaksen/home-ops"
  provider:
    name: github
  image: ghcr.io/renovatebot/renovate:43.202.1@sha256:40f5d9112767430764de4e8411f1cc8db0d9b84fa3c0ab8ebc4a67b3350b8d17
  schedule: "0 * * * *"
  parallelism: 3
  secretRef: renovate-token
  extraEnv:
    - name: LOG_LEVEL
      value: info
    - name: RENOVATE_PLATFORM_COMMIT
      value: enabled
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 2Gi
  webhook:
    enabled: true
    authentication:
      enabled: false
