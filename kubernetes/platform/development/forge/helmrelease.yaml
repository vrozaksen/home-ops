---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forge
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      forge:
        type: deployment
        replicas: 1
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              # renovate: datasource=docker depName=registry.vzkn.eu/containers/forge
              repository: registry.vzkn.eu/containers/forge
              tag: 2.34.8@sha256:5851f04361936d2a28fe8d50cca250fe077c0eb41d3fbf3c97978ff5ea49f8c9
            env:
              TZ: ${TZ}
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
              limits:
                cpu: "4"
                memory: 8Gi
            securityContext:
              # sshd needs root + a minimal cap set; AUDIT_WRITE omitted (no utmp).
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - "ALL"
                add:
                  - CHOWN
                  - DAC_OVERRIDE
                  - FOWNER
                  - SETGID
                  - SETUID
                  - SYS_CHROOT
            probes:
              # Exec probe: check sshd PID via kill -0 (no TCP, zero log noise).
              # All real :22 connections — even from inside the cluster — stay logged.
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /root/.nix-profile/bin/bash
                      - -c
                      - 'kill -0 $(cat /run/sshd.pid)'
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /root/.nix-profile/bin/bash
                      - -c
                      - 'kill -0 $(cat /run/sshd.pid)'
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 30
    defaultPodOptions:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        seccompProfile:
          type: RuntimeDefault
    service:
      ssh:
        controller: forge
        type: ClusterIP
        ports:
          ssh:
            port: 22
            protocol: TCP
    persistence:
      data:
        existingClaim: forge
        advancedMounts:
          forge:
            app:
              - path: /home/vrozaksen
                subPath: home
              - path: /etc/ssh/keys
                subPath: keys
      authorized-keys:
        type: secret
        name: forge-secret
        defaultMode: 0o444
        advancedMounts:
          forge:
            app:
              - path: /etc/ssh/authorized_keys/authorized_keys
                subPath: authorized_keys
                readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
