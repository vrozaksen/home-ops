---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalpushsecret_v1alpha1.json
# Push the Kanidm-provisioned harbor OIDC client creds (k8s Secret kanidm-harbor-oidc,
# written by the kanidm-provision sidecar) up to Infisical so terraform/harbor can read
# them and configure Harbor's OIDC (harbor_config_auth) against Kanidm.
# Destination folder /terraform/kanidm/oidc must already exist (push won't create it).
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalPushSecret
metadata:
  name: kanidm-harbor-oidc-push
spec:
  resyncInterval: 1h
  hostAPI: https://eu.infisical.com/api
  updatePolicy: Replace
  destination:
    projectSlug: vzkn-eu-v2-zn
    environmentSlug: prod
    secretsPath: /terraform/kanidm/oidc
  push:
    secret:
      secretName: kanidm-harbor-oidc
      secretNamespace: harbor
      template:
        includeAllSecrets: false
        data:
          HARBOR_CLIENT_ID: '{{ (index . "client-id").Value }}'
          HARBOR_CLIENT_SECRET: '{{ (index . "client-secret").Value }}'
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
