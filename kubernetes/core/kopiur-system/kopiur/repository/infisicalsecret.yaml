---
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
# NOTE: Multi-source - configure Secret Imports in Infisical for: /shared/volsync, /terraform/garage/buckets
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name kopiur-repository-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/kopiur-system/kopiur
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: kopiur-system
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          # Same password as the volsync kopia repo - replication copies blobs
          # verbatim, so the garage repo shares the source encryption password
          KOPIA_PASSWORD: '{{ .KOPIA_PASSWORD.Value }}'
          AWS_ACCESS_KEY_ID: '{{ .KOPIUR_ACCESS_KEY_ID.Value }}'
          AWS_SECRET_ACCESS_KEY: '{{ .KOPIUR_SECRET_ACCESS_KEY.Value }}'
