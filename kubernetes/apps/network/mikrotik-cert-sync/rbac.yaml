---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mikrotik-cert-sync
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mikrotik-cert-sync
rules:
  - apiGroups:
      - ""
    resources:
      - "secrets"
    resourceNames:
      - "vzkn-eu-tls"
    verbs:
      - "get"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mikrotik-cert-sync
subjects:
  - kind: ServiceAccount
    name: mikrotik-cert-sync
    namespace: network
roleRef:
  kind: Role
  name: mikrotik-cert-sync
  apiGroup: rbac.authorization.k8s.io
