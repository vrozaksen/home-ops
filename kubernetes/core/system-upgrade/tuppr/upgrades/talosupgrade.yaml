---
# yaml-language-server: $schema=https://schemas.vzkn.eu/tuppr.home-operations.com/talosupgrade_v1alpha1.json
apiVersion: tuppr.home-operations.com/v1alpha1
kind: TalosUpgrade
metadata:
  name: talos
spec:
  # Exclude granzam: unstable (random crashes + bootloop, non-ECC RAM) — re-include once diagnosed
  nodeSelector:
    matchExpressions:
      - key: kubernetes.io/hostname
        operator: NotIn
        values:
          - "granzam"
  talos:
    # renovate: datasource=docker depName=ghcr.io/siderolabs/installer
    version: v1.13.3
  policy:
    # kexec, not powercycle: M720q hardware watchdog does not power-cycle the box
    rebootMode: default
  drain:
    # Evict pods first so CSI unmaps RBD before Talos' own unmount (avoids D-state hang on drain)
    enabled: true
  healthChecks:
    - apiVersion: volsync.backube/v1alpha1
      kind: ReplicationSource
      expr: |-
        status.conditions.filter(c, c.type == "Synchronizing").all(c, c.status == "False")
    - apiVersion: ceph.rook.io/v1
      kind: CephCluster
      expr: |-
        status.ceph.health in ['HEALTH_OK']
