---
# NOTE: Multi-source - configure Secret Imports in Infisical for: attic, /terraform/garage/buckets
# Infisical folder /kubernetes/development/attic must contain:
#   - ATTIC_JWT_SECRET (manually generated via: openssl rand -base64 64)
# Infisical Secret Import from /terraform/garage/buckets should map:
#   - attic-access-key-id  -> ATTIC_ACCESS_KEY_ID
#   - attic-secret-access-key -> ATTIC_SECRET_ACCESS_KEY
# yaml-language-server: $schema=https://schemas.vzkn.eu/secrets.infisical.com/infisicalsecret_v1alpha1.json
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: &name attic-secret
spec:
  hostAPI: https://eu.infisical.com/api
  syncConfig:
    resyncInterval: 1m
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: vzkn-eu-v2-zn
        envSlug: prod
        secretsPath: /kubernetes/development/attic
      credentialsRef:
        secretName: infisical-credentials
        secretNamespace: security
  managedKubeSecretReferences:
    - secretName: *name
      secretNamespace: development
      secretType: Opaque
      template:
        includeAllSecrets: false
        data:
          AWS_ACCESS_KEY_ID: '{{ .ATTIC_ACCESS_KEY_ID.Value }}'
          AWS_SECRET_ACCESS_KEY: '{{ .ATTIC_SECRET_ACCESS_KEY.Value }}'
          AWS_DEFAULT_REGION: "eu-central-1"
          ATTIC_SERVER_TOKEN_HS256_SECRET_BASE64: '{{ .ATTIC_JWT_SECRET.Value }}'
