---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
# Tekton operator CRDs vendored from upstream release.yaml (Helm chart installCRDs=true
# ships an incomplete subset — 10 of 13 CRDs — causing operator informers to fail).
# Refresh when the operator version bumps:
#   V=v0.79.0; curl -sL "https://github.com/tektoncd/operator/releases/download/$V/release.yaml" \
#     | yq 'select(.kind == "CustomResourceDefinition")' > upstream-crds-$V.yaml
# renovate: datasource=github-releases depName=tektoncd/operator
#   operatorVersion: v0.79.0
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./upstream-crds-v0.79.0.yaml
  - ./helmrelease.yaml
